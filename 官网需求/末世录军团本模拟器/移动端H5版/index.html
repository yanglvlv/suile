<script>
var TASKS = [
  { id: 'task1', name: '完成所有教学任务', reward: '奖励名称', condition: 'all' }
];

var STAGES = [
  {
    id: 1,
    name: '关卡一',
    reward: '雷米援助*5',
    videoUrl: '',
    question: '待填：关卡一的题目内容？',
    options: [
      { key: 'A', text: '待填：选项一' },
      { key: 'B', text: '待填：选项二' },
      { key: 'C', text: '待填：选项三' },
      { key: 'D', text: '待填：选项四' }
    ],
    answer: 'A',
    okText: '待填：关卡一正确解析',
    errText: '待填：关卡一错误解析'
  },
  {
    id: 2,
    name: '关卡二',
    reward: '雷米援助*5',
    videoUrl: '',
    question: '待填：关卡二的题目内容？',
    options: [
      { key: 'A', text: '待填：选项一' },
      { key: 'B', text: '待填：选项二' },
      { key: 'C', text: '待填：选项三' },
      { key: 'D', text: '待填：选项四' }
    ],
    answer: 'B',
    okText: '待填：关卡二正确解析',
    errText: '待填：关卡二错误解析'
  },
  {
    id: 3,
    name: '关卡三',
    reward: '雷米援助*5',
    videoUrl: '',
    question: '待填：关卡三的题目内容？',
    options: [
      { key: 'A', text: '待填：选项一' },
      { key: 'B', text: '待填：选项二' },
      { key: 'C', text: '待填：选项三' },
      { key: 'D', text: '待填：选项四' }
    ],
    answer: 'C',
    okText: '待填：关卡三正确解析',
    errText: '待填：关卡三错误解析'
  }
];

var STORE_KEY = 'legion-simulator-h5-v5';
var state = {
  stageCleared: {},
  stageRewarded: {},
  taskClaimed: {}
};
var currentMode = 'mobile';
var currentStageIndex = 0;
var currentQuizOptions = [];
var selectedOptionKey = '';
var currentPageType = 'home';
var answerLocked = false;

function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') state = parsed;
    }
  } catch (e) {}
  if (!state.stageCleared) state.stageCleared = {};
  if (!state.stageRewarded) state.stageRewarded = {};
  if (!state.taskClaimed) state.taskClaimed = {};
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function showToast(text) {
  var toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function () {
    toast.classList.remove('show');
  }, 1800);
}

function shuffleArray(list) {
  var arr = list.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var randomIndex = Math.floor(Math.random() * (i + 1));
    var temp = arr[i];
    arr[i] = arr[randomIndex];
    arr[randomIndex] = temp;
  }
  return arr;
}

function isTaskComplete(task) {
  var i;
  if (task.condition === 'all') {
    for (i = 0; i < STAGES.length; i++) {
      if (!state.stageCleared[STAGES[i].id]) return false;
    }
    return true;
  }
  for (i = 0; i < task.condition.length; i++) {
    if (!state.stageCleared[task.condition[i]]) return false;
  }
  return true;
}

function renderTaskBoard() {
  var html = '';
  for (var i = 0; i < TASKS.length; i++) {
    var task = TASKS[i];
    var complete = isTaskComplete(task);
    var claimed = !!state.taskClaimed[task.id];
    var buttonClass = 'task-btn locked';
    var buttonText = '领取';
    if (claimed) {
      buttonClass = 'task-btn done';
      buttonText = '已领取';
    } else if (complete) {
      buttonClass = 'task-btn ready';
      buttonText = '领取';
    }

    html += '' +
      '<div class="task-item card">' +
        '<div class="task-main">' +
          '<div class="task-name">' + task.name + '</div>' +
          '<div class="task-reward">' + task.reward + '</div>' +
        '</div>' +
        '<div class="reward-icon">奖励<br>icon</div>' +
        '<button class="' + buttonClass + '" onclick="claimTask(\'' + task.id + '\')">' + buttonText + '</button>' +
      '</div>';
  }
  document.getElementById('taskBoard').innerHTML = html;
}

function claimTask(taskId) {
  var task = null;
  for (var i = 0; i < TASKS.length; i++) {
    if (TASKS[i].id === taskId) {
      task = TASKS[i];
      break;
    }
  }
  if (!task) return;
  if (state.taskClaimed[taskId]) {
    showToast('该奖励已领取');
    return;
  }
  if (!isTaskComplete(task)) {
    showToast('请先完成对应教学');
    return;
  }
  state.taskClaimed[taskId] = true;
  saveState();
  renderTaskBoard();
  showToast('领取成功');
}

function getStageCardClass(index) {
  if (currentMode === 'mobile' && index === STAGES.length - 1 && STAGES.length % 2 === 1) return 'stage-card card wide';
  return 'stage-card card';
}

function renderStageGrid() {
  var html = '';
  for (var i = 0; i < STAGES.length; i++) {
    var stage = STAGES[i];
    var cleared = !!state.stageCleared[stage.id];
    var rewarded = !!state.stageRewarded[stage.id];
    var rewardClass = rewarded ? 'reward-chip got' : 'reward-chip';
    var rewardText = rewarded ? '已获得：' + stage.reward : '可获得：' + stage.reward;
    var iconClass = cleared ? 'stage-icon learned' : 'stage-icon';
    html += '' +
      '<div class="' + getStageCardClass(i) + '">' +
        '<div class="stage-name">' + stage.name + '</div>' +
        '<div class="' + iconClass + '">关卡\n头像' + (cleared ? '<span class="learned-mask">已学习</span>' : '') + '</div>' +
        '<div class="' + rewardClass + '" onclick="clickReward(' + stage.id + ')">' + rewardText + '</div>' +
        '<div class="stage-actions">' +
          '<button class="video-entry" onclick="openVideoPage(' + i + ')">视频<br>教学</button>' +
          '<button class="pill-btn enter-btn" onclick="openQuizPage(' + i + ')">进入</button>' +
          '<div class="stage-reward-icon ' + (rewarded ? 'claimed' : (cleared ? 'claimable' : 'locked')) + '" onclick="claimStageReward(' + stage.id + ',' + i + ')">' +
            '<div class="sri-box">' + (rewarded ? '✓' : '🎁') + '</div>' +
            '<div class="sri-label">' + (rewarded ? '已领取' : (cleared ? '可领取' : '')) + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }
  document.getElementById('stageGrid').innerHTML = html;
}

function showPage(pageId) {
  currentPageType = pageId === 'homePage' ? 'home' : (pageId === 'videoPage' ? 'video' : 'quiz');
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(pageId).classList.add('active');
}

function renderHome() {
  renderTaskBoard();
  renderStageGrid();
  showPage('homePage');
}

function getVideoPlaceholder(labelPrefix) {
  return '<div class="video-placeholder"><span>' + labelPrefix + '（390×270）</span></div>';
}

function buildVideoNode(stage, labelPrefix, containerId, withAnalysisLayer) {
  var container = document.getElementById(containerId);
  var content = '';
  if (stage.videoUrl) {
    content = '<video src="' + stage.videoUrl + '" controls playsinline autoplay></video>';
  } else {
    content = getVideoPlaceholder(labelPrefix);
  }
  if (withAnalysisLayer) {
    content += '<div class="analysis-layer" id="analysisLayer"></div>';
  }
  container.innerHTML = content;
}

function openVideoPage(index) {
  currentStageIndex = index;
  var stage = STAGES[index];
  document.getElementById('detailNameVideo').textContent = stage.name;
  document.getElementById('detailProgressVideo').textContent = '第' + (index + 1) + '/' + STAGES.length + '关';
  buildVideoNode(stage, '关卡视频', 'videoTeachingWrap', false);
  showPage('videoPage');
}

function clickReward(stageId) {
  var cleared = !!state.stageCleared[stageId];
  var rewarded = !!state.stageRewarded[stageId];
  if (!cleared) {
    showToast('请先完成该关卡教学！');
  } else if (rewarded) {
    showToast('已获得该奖励');
  } else {
    showToast('请点击奖励图标领取');
  }
}

function claimStageReward(stageId, index) {
  var cleared = !!state.stageCleared[stageId];
  var rewarded = !!state.stageRewarded[stageId];
  if (!cleared) {
    showToast('请先完成该关卡教学！');
    return;
  }
  if (rewarded) {
    showToast('该奖励已领取');
    return;
  }
  state.stageRewarded[stageId] = true;
  saveState();
  showToast('领取成功！');
  renderStageGrid();
  renderTaskBoard();
}

function openQuizPage(index, keepCurrentOrder) {
  currentStageIndex = index;
  selectedOptionKey = '';
  answerLocked = false;
  var stage = STAGES[index];
  document.getElementById('detailNameQuiz').textContent = stage.name;
  document.getElementById('detailProgressQuiz').textContent = '第' + (index + 1) + '/' + STAGES.length + '关';
  document.getElementById('quizQuestion').textContent = stage.question;
  buildVideoNode(stage, '播放题目视频', 'quizVideoWrap', true);
  if (!keepCurrentOrder) {
    currentQuizOptions = stage.options.slice();
  }
  renderQuizOptions();
  showPage('quizPage');
}

function renderQuizOptions() {
  var html = '';
  for (var i = 0; i < currentQuizOptions.length; i++) {
    html += '<button class="option-item" data-key="' + currentQuizOptions[i].key + '" onclick="pickOption(this,\'' + currentQuizOptions[i].key + '\')">' + currentQuizOptions[i].text + '</button>';
  }
  document.getElementById('quizOptions').innerHTML = html;
}

function pickOption(element, key) {
  if (answerLocked) return;
  selectedOptionKey = key;
  var options = document.querySelectorAll('.option-item');
  for (var i = 0; i < options.length; i++) options[i].classList.remove('selected');
  element.classList.add('selected');
  setTimeout(function () {
    submitAnswer();
  }, 220);
}

function submitAnswer() {
  if (!selectedOptionKey || answerLocked) return;
  answerLocked = true;
  var stage = STAGES[currentStageIndex];
  var correct = selectedOptionKey === stage.answer;
  var options = document.querySelectorAll('.option-item');
  for (var i = 0; i < options.length; i++) {
    var key = options[i].getAttribute('data-key');
    options[i].classList.add('disabled');
    if (correct && key === stage.answer) options[i].classList.add('correct');
  }

  if (correct) {
    state.stageCleared[stage.id] = true;
    saveState();
  }

  setTimeout(function () {
    showAnalysis(correct ? '选择正确' : '选择错误', correct ? stage.okText : stage.errText, correct);
  }, 320);
}

function findNextUnclearedIndex() {
  for (var i = currentStageIndex + 1; i < STAGES.length; i++) {
    if (!state.stageCleared[STAGES[i].id]) return i;
  }
  return -1;
}

function showAnalysis(title, text, isCorrect) {
  var layer = document.getElementById('analysisLayer');
  var buttonHtml = '';
  if (isCorrect) {
    var nextIndex = findNextUnclearedIndex();
    if (nextIndex > -1) {
      buttonHtml = '<button class="analysis-btn primary" onclick="openQuizPage(' + nextIndex + ')">下一题</button>';
    } else {
      buttonHtml = '<button class="analysis-btn primary" onclick="backHome()">返回首页</button>';
    }
  } else {
    buttonHtml = '<button class="analysis-btn primary" onclick="retryCurrentQuiz()">重答本题</button>';
  }

  layer.innerHTML = '' +
    '<div class="analysis-card">' +
      '<div class="analysis-title ' + (isCorrect ? 'correct' : 'wrong') + '">' + title + '</div>' +
      '<div class="analysis-text">解析：' + text + '</div>' +
      buttonHtml +
    '</div>';
  layer.classList.add('show');
}

function retryCurrentQuiz() {
  var stage = STAGES[currentStageIndex];
  selectedOptionKey = '';
  answerLocked = false;
  currentQuizOptions = shuffleArray(stage.options);
  var layer = document.getElementById('analysisLayer');
  layer.classList.remove('show');
  layer.innerHTML = '';
  renderQuizOptions();
  var video = document.querySelector('#quizVideoWrap video');
  if (video) {
    video.currentTime = 0;
    video.play();
  }
}

function backHome() {
  var videos = document.querySelectorAll('video');
  for (var i = 0; i < videos.length; i++) videos[i].pause();
  renderHome();
}

loadState();
renderHome();
</script>
</body>
</html>
