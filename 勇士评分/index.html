<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日意思X5 - 勇士评分</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0c0a1a;
  color: #e0e0e0;
  overflow-x: hidden;
}

/* ===== 顶部Tab导航 ===== */
.top-tabs {
  display: flex; justify-content: center; gap: 10px;
  padding: 12px 16px 8px;
  background: linear-gradient(180deg, #1a1035 0%, #0c0a1a 100%);
  position: sticky; top: 0; z-index: 100;
}
.tab-item {
  padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .3s; position: relative; letter-spacing: 1px;
  border: 1px solid rgba(255,180,50,.3); color: #ffd866;
  background: linear-gradient(180deg, rgba(255,180,50,.12) 0%, rgba(255,120,20,.06) 100%);
  text-shadow: 0 0 8px rgba(255,180,50,.4);
}
.tab-item.active {
  border-color: #ffd866;
  background: linear-gradient(180deg, rgba(255,180,50,.25) 0%, rgba(255,120,20,.12) 100%);
  box-shadow: 0 0 12px rgba(255,180,50,.2), inset 0 0 12px rgba(255,180,50,.08);
}
.tab-item::before, .tab-item::after {
  content: '✦'; position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 8px; color: #ffd866; opacity: .6;
}
.tab-item::before { left: 6px; }
.tab-item::after { right: 6px; }

/* ===== 社区内容卡片 ===== */
.community-card {
  margin: 12px 16px; border-radius: 14px; overflow: hidden;
  background: linear-gradient(160deg, #1e1245 0%, #150d35 50%, #1a1040 100%);
  border: 1px solid rgba(120,80,220,.25);
  box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}
.community-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 10px;
}
.community-avatar {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, #5a3ec8, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(90,62,200,.4);
}
.community-name {
  font-size: 15px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.community-title {
  padding: 0 16px 12px;
  font-size: 16px; font-weight: 700; color: #ff9f43;
  text-shadow: 0 0 10px rgba(255,159,67,.3);
  line-height: 1.5;
}
.community-video {
  position: relative; margin: 0 12px 14px;
  border-radius: 10px; overflow: hidden;
  background: rgba(0,0,0,.4); aspect-ratio: 16/9;
  border: 1px solid rgba(120,80,220,.2);
}
.video-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1040 0%, #251560 50%, #1a1040 100%);
  display: flex; align-items: center; justify-content: center;
}
.play-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .3s;
}
.play-btn::after {
  content: ''; width: 0; height: 0;
  border-left: 20px solid #fff; border-top: 12px solid transparent; border-bottom: 12px solid transparent;
  margin-left: 4px;
}
.play-btn:hover { background: rgba(90,62,200,.6); border-color: rgba(255,255,255,.4); }

/* ===== 评分模块（重新设计为暗色风格） ===== */
.rating-section {
  margin: 12px 16px; border-radius: 14px; overflow: hidden;
  background: url('A_dark_purple_gradient_backgro_2026-04-07T03-00-46.png') center/cover no-repeat;
  border: 1px solid rgba(120,80,220,.25);
  box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}

/* 评分标题区 */
.rating-header {
  padding: 16px 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(120,80,220,.15);
}
.rating-title {
  font-size: 17px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 8px;
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.rating-title .arrow {
  font-size: 14px; color: #ffd866; opacity: .7;
}
.rating-sub {
  font-size: 12px; color: rgba(255,255,255,.4); margin-top: 4px;
}

/* 评分列表 */
.rating-list {
  padding: 8px 12px 12px;
}
.rating-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 10px;
  border-radius: 12px; margin-bottom: 6px;
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(120,80,220,.08);
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.rating-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(120,80,220,.06) 0%, transparent 60%);
  pointer-events: none;
}
.rating-item:hover {
  background: rgba(120,80,220,.08);
  border-color: rgba(120,80,220,.2);
  transform: translateX(2px);
}

/* 头像 */
.rating-avatar {
  width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, #2a1a5e, #3d2680);
  border: 2px solid rgba(120,80,220,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; position: relative; z-index: 1;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
  overflow: hidden;
}
.rating-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

/* 信息 */
.rating-info {
  flex: 1; min-width: 0; position: relative; z-index: 1;
}
.rating-name {
  font-size: 15px; font-weight: 700; color: #fff;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rating-comment {
  font-size: 12px; color: #ff9f43; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.rating-comment::before {
  content: '"'; font-size: 16px; font-weight: 700; margin-right: 2px;
  color: rgba(255,159,67,.6);
}

/* 分数 */
.rating-score-wrap {
  text-align: center; flex-shrink: 0; position: relative; z-index: 1;
  min-width: 56px;
}
.rating-score {
  font-size: 28px; font-weight: 900; line-height: 1;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.rating-score-label {
  font-size: 10px; color: rgba(255,255,255,.35); margin-top: 3px;
  letter-spacing: 1px;
}


/* ===== 底部装饰 ===== */
.section-divider {
  height: 1px; margin: 0 30px;
  background: linear-gradient(90deg, transparent, rgba(120,80,220,.3), transparent);
}

/* ===== 加载更多 ===== */
.load-more {
  text-align: center; padding: 20px 0 30px;
}
.load-more-btn {
  padding: 10px 40px; border-radius: 24px; font-size: 13px;
  color: rgba(255,255,255,.5); cursor: pointer;
  background: rgba(120,80,220,.08);
  border: 1px solid rgba(120,80,220,.2);
  transition: all .3s; font-weight: 500;
}
.load-more-btn:hover {
  background: rgba(120,80,220,.15);
  border-color: rgba(120,80,220,.4);
  color: #fff;
}

/* ===== 背景装饰 ===== */
body::before {
  content: ''; position: fixed; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(90,62,200,.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(120,40,180,.06) 0%, transparent 50%);
  pointer-events: none; z-index: -1;
  animation: bgFloat 15s ease-in-out infinite;
}
@keyframes bgFloat {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(-2%,-2%); }
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(120,80,220,.3); border-radius: 2px; }

/* ===== 动画 ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.rating-item { animation: fadeInUp .4s ease forwards; opacity: 0; }
.rating-item:nth-child(1) { animation-delay: .05s; }
.rating-item:nth-child(2) { animation-delay: .1s; }
.rating-item:nth-child(3) { animation-delay: .15s; }
.rating-item:nth-child(4) { animation-delay: .2s; }
.rating-item:nth-child(5) { animation-delay: .25s; }

/* ===== 响应式 ===== */
@media (min-width: 480px) {
  .community-card, .rating-section { margin: 12px auto; max-width: 420px; }
  .top-tabs { max-width: 420px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- ====== 顶部Tab ====== -->
<div class="top-tabs">
  <div class="tab-item active">版本话题</div>
  <div class="tab-item">版本资讯</div>
  <div class="tab-item">专属福利</div>
  <div class="tab-item">热门推荐</div>
</div>

<!-- ====== 社区内容卡片 ====== -->
<div class="community-card">
  <div class="community-header">
    <div class="community-avatar">🎮</div>
    <div class="community-name">COLG玩家社区</div>
  </div>
  <div class="community-title">命运的抉择改版回归，基础玩法与奖励介绍</div>
  <div class="community-video">
    <div class="video-placeholder">
      <div class="play-btn"></div>
    </div>
  </div>
</div>

<!-- ====== 勇士评分模块（暗色游戏风格） ====== -->
<div class="rating-section">
  <div class="rating-header">
    <div>
      <div class="rating-title">
        每日意思X5莫咯咯lol
        <span class="arrow">&gt;&gt;</span>
      </div>
      <div class="rating-sub">6勇士评分</div>
    </div>

  </div>
  <div class="section-divider"></div>
  <div class="rating-list" id="ratingList">
    <!-- JS渲染 -->
  </div>
</div>

<!-- ====== 加载更多 ====== -->
<div class="load-more">
  <button class="load-more-btn" onclick="alert('加载更多评分')">查看更多勇士评分</button>
</div>

<script>
// 评分数据
const ratings = [
  {
    name: '沐浴桶',
    comment: '一般一般',
    score: 6,
    voters: 1,
    avatar: '🛁'
  },
  {
    name: '哦日子咯我',
    comment: '当前版本不支持表情包，请升级...',
    score: 5.2,
    voters: 4,
    avatar: '😎'
  },
  {
    name: '拒绝来咯',
    comment: 'ddddd',
    score: 4,
    voters: 1,
    avatar: '🛡️'
  },
  {
    name: '暗夜剑魂',
    comment: '还不错，就是有点肝',
    score: 7.5,
    voters: 3,
    avatar: '⚔️'
  },
  {
    name: '阿拉德冒险家',
    comment: '挺有意思的新玩法',
    score: 8.2,
    voters: 5,
    avatar: '🌟'
  }
];

function renderRatings() {
  const list = document.getElementById('ratingList');
  list.innerHTML = ratings.map((r, i) => {
    return `
      <div class="rating-item">
        <div class="rating-avatar">${r.avatar}</div>
        <div class="rating-info">
          <div class="rating-name">${r.name}</div>
          <div class="rating-comment">${r.comment}</div>
        </div>
        <div class="rating-score-wrap">
          <div class="rating-score">${r.score}</div>
          <div class="rating-score-label">${r.voters}勇士评分</div>
        </div>
      </div>
    `;
  }).join('');
}

// Tab切换
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

renderRatings();
</script>
</body>
</html>
