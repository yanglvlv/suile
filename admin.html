<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNF壁纸站 · 配置后台</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f6fa;color:#333;min-height:100vh}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e2235;color:#b0b8d0;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto}
.sidebar-logo{padding:20px 24px;font-size:15px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,0.06);letter-spacing:1px}
.sidebar-logo small{display:block;font-size:11px;color:#5a6080;font-weight:400;margin-top:2px}
.sidebar-nav{padding:12px 0}
.nav-group-title{padding:8px 24px;font-size:11px;color:#4a5070;letter-spacing:2px;text-transform:uppercase}
.sidebar-link{
  display:flex;align-items:center;gap:10px;
  padding:10px 24px;font-size:13px;color:#8090b0;cursor:pointer;
  transition:all .2s;border-left:3px solid transparent;
}
.sidebar-link:hover{background:rgba(255,255,255,0.04);color:#c0c8e0}
.sidebar-link.active{background:rgba(80,144,255,0.08);color:#7eb6ff;border-left-color:#5090ff}
.sidebar-link svg{width:16px;height:16px;flex-shrink:0}

.main{margin-left:220px;flex:1;padding:0}
.topbar{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid #e8eaf0;
  padding:16px 32px;display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{font-size:16px;font-weight:600;color:#1a1e30}
.topbar-actions{display:flex;gap:8px}
.btn{
  padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid #dde0e8;background:#fff;color:#555;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:#bbc0d0;color:#333}
.btn-primary{background:#4070e0;color:#fff;border-color:#4070e0}
.btn-primary:hover{background:#3560d0}
.btn-danger{color:#e04040;border-color:#f0c0c0}
.btn-danger:hover{background:#fef0f0}
.btn-sm{padding:5px 12px;font-size:12px}

.content{padding:24px 32px}

/* Cards */
.card{background:#fff;border-radius:10px;border:1px solid #e8eaf0;margin-bottom:20px}
.card-header{
  padding:16px 20px;border-bottom:1px solid #f0f1f5;
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:600;color:#1a1e30}
.card-body{padding:20px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#8090b0;font-weight:500;border-bottom:1px solid #f0f1f5;font-size:12px;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f8f9fc;vertical-align:middle}
tr:hover td{background:#fafbfe}
.td-img{width:80px;height:45px;object-fit:cover;border-radius:4px;background:#f0f1f5}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-blue{background:#eef3ff;color:#4070e0}
.tag-green{background:#eefbf4;color:#30a060}
.tag-orange{background:#fff5ee;color:#d07020}
.tag-gray{background:#f0f1f5;color:#8090b0}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.status-on{background:#30c060}
.status-off{background:#ccc}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:6px}
.form-label .req{color:#e04040;margin-left:2px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:8px 12px;border:1px solid #dde0e8;border-radius:6px;
  font-size:13px;color:#333;background:#fff;transition:border-color .2s;
  font-family:inherit;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#4070e0}
.form-textarea{min-height:80px;resize:vertical}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.form-hint{font-size:11px;color:#aaa;margin-top:4px}

/* Modal */
.admin-modal{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;
  background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;
}
.admin-modal.show{display:flex}
.admin-modal-box{
  background:#fff;border-radius:12px;width:580px;max-height:85vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);
}
.admin-modal-header{
  padding:18px 24px;border-bottom:1px solid #f0f1f5;
  display:flex;align-items:center;justify-content:space-between;
}
.admin-modal-header h3{font-size:15px;font-weight:600}
.admin-modal-close{
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#999;font-size:18px;transition:all .2s;border:none;background:none;
}
.admin-modal-close:hover{background:#f0f1f5;color:#333}
.admin-modal-body{padding:20px 24px}
.admin-modal-footer{padding:16px 24px;border-top:1px solid #f0f1f5;display:flex;justify-content:flex-end;gap:8px}

/* 扩展字段 */
.ext-fields{margin-top:8px}
.ext-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.ext-row input{flex:1}
.ext-row .btn-sm{flex-shrink:0}
.ext-row select{width:80px;flex-shrink:0;padding:7px 6px;border:1px solid #dde0e8;border-radius:6px;font-size:12px}

/* 分辨率图片组 */
.res-upload-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;font-size:12px;color:#666;padding:8px 10px;border-radius:6px;border:1px solid #eee;background:#fafbfe}
.res-upload-row.checked{border-color:#c0d0ff;background:#f4f7ff}
.res-upload-row span.res-label{min-width:120px;display:flex;align-items:center;gap:6px}
.res-upload-row input[type="checkbox"]{accent-color:#4070e0}
.res-upload-row .res-type-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:#eef3ff;color:#4070e0}
.res-upload-row input[type="text"]{flex:1}

/* 子分类列表 */
.sub-cat-list{margin-top:8px;padding-left:12px}
.sub-cat-item{
  display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666;
}
.sub-cat-item input{flex:1;padding:5px 8px;border:1px solid #e0e2ea;border-radius:4px;font-size:12px}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}

/* 预览链接 */
.preview-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;color:#4070e0;cursor:pointer;
}
.preview-link:hover{text-decoration:underline}

/* Toast */
.toast{
  position:fixed;top:20px;right:20px;z-index:9999;
  padding:12px 20px;border-radius:8px;font-size:13px;
  background:#1e2235;color:#fff;opacity:0;transform:translateY(-10px);
  transition:all .3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}

/* Sortable handle */
.drag-handle{cursor:grab;color:#ccc;font-size:16px;user-select:none}
.drag-handle:hover{color:#888}
</style>

// ===== Load/Save =====
let DATA;
function load(){
  try{ DATA = JSON.parse(localStorage.getItem(STORE_KEY)) || getDefaultData(); }
  catch(e){ DATA = getDefaultData(); }
}
function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
}
function resetAll(){
  if(!confirm('确定重置所有配置为默认数据？')) return;
  DATA = getDefaultData();
  save();
  renderCurrentTab();
  toast('已重置为默认数据');
}

// ===== Toast =====
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== Tab Switch =====
let currentTab = 'banner';
let editingItem = null;

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.toggle('active',l.dataset.tab===tab));
  const titles = {banner:'Banner管理',category:'分类管理',wallpaper:'壁纸管理',submit:'投稿配置'};
  document.getElementById('tabTitle').textContent = titles[tab];
  document.getElementById('addBtn').style.display = (tab==='submit')?'none':'';
  renderCurrentTab();
}

function renderCurrentTab(){
  const c = document.getElementById('tabContent');
  switch(currentTab){
    case 'banner': c.innerHTML = renderBannerTab(); break;
    case 'category': c.innerHTML = renderCategoryTab(); break;
    case 'wallpaper': c.innerHTML = renderWallpaperTab(); break;
    case 'submit': c.innerHTML = renderSubmitTab(); break;
  }
}

// ===== ID Generator =====
function nextId(arr){ return arr.length ? Math.max(...arr.map(a=>a.id))+1 : 1; }

// ===== Helpers =====
function getCatPath(catId){
  for(const c of DATA.categories){
    if(c.id===catId) return c.name;
    for(const sub of (c.children||[])){
      if(sub.id===catId) return c.name+' / '+sub.name;
    }
  }
  return '-';
}
function getAllCatOptions(){
  let opts=[];
  for(const c of DATA.categories){
    if((c.children||[]).length>0){
      for(const sub of c.children){
        opts.push({id:sub.id, label:c.name+' / '+sub.name});
      }
    }else{
      opts.push({id:c.id, label:c.name});
    }
  }
  return opts;
}

          <input type="text" class="form-input res-label-input" value="${f.label||''}" placeholder="分辨率 如1920×1080" style="width:140px;flex:none">
          <select class="form-select res-type-select" style="width:80px;flex:none"><option value="横版" ${f.type==='横版'?'selected':''}>横版</option><option value="竖版" ${f.type==='竖版'?'selected':''}>竖版</option></select>
          <input type="text" class="form-input res-url" value="${f.url||''}" placeholder="图片URL" style="flex:1">
          <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove();refreshPresets()">×</button>
        </div>`).join('')}</div>
    </div>`;

  setTimeout(()=>refreshPresets(), 0);
  document.getElementById('adminModal').classList.add('show');
}
function addExtField(){
  const list = document.getElementById('extFieldList');
  const div = document.createElement('div');
  div.className='ext-row';
  div.innerHTML=`<input class="form-input ext-key" value="" placeholder="字段名"><input class="form-input ext-val" value="" placeholder="字段值"><select class="ext-show"><option value="true" selected>显示</option><option value="false">隐藏</option></select><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>`;
  list.appendChild(div);
}

// ===== 分辨率预设 & 行管理 =====
const RES_PRESETS = [
  {label:'1920×1080',type:'横版'},{label:'1920×1200',type:'横版'},
  {label:'2560×1440',type:'横版'},{label:'3840×2160',type:'横版'},
  {label:'750×1334',type:'竖版'},{label:'1080×1920',type:'竖版'},
  {label:'1080×2160',type:'竖版'},{label:'1125×2436',type:'竖版'},
];

function refreshPresets(){
  const box = document.getElementById('resPresets');
  if(!box) return;
  const usedLabels = [...document.querySelectorAll('#resUploadList .res-label-input')].map(el=>el.value.trim());
  box.innerHTML = RES_PRESETS.filter(p=>!usedLabels.includes(p.label)).map(p=>
    `<button class="btn btn-sm" style="font-size:11px;padding:3px 10px" onclick="addResPreset('${p.label}','${p.type}')">${p.label} (${p.type})</button>`
  ).join('');
}

function addResPreset(label, type){
  addResRow(label, type);
  refreshPresets();
}

function addResRow(label, type){
  label = label||''; type = type||'横版';
  const list = document.getElementById('resUploadList');
  const div = document.createElement('div');
  div.className='res-upload-row checked';
  div.innerHTML=`
    <input type="text" class="form-input res-label-input" value="${label}" placeholder="分辨率 如1920×1080" style="width:140px;flex:none">
    <select class="form-select res-type-select" style="width:80px;flex:none"><option value="横版" ${type==='横版'?'selected':''}>横版</option><option value="竖版" ${type==='竖版'?'selected':''}>竖版</option></select>
    <input type="text" class="form-input res-url" value="" placeholder="图片URL" style="flex:1">
    <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove();refreshPresets()">×</button>`;
  list.appendChild(div);
}

// =============================
// Submit Config Tab
// =============================
function renderSubmitTab(){
  const s = DATA.submitConfig;
  const catOpts = DATA.categories.filter(c=>c.type==='ugc').map(c=>`<option value="${c.id}" ${s.catId===c.id?'selected':''}>${c.name}</option>`).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">投稿配置</span></div><div class="card-body">
    <div class="form-group"><label class="form-label">关联分类（UGC类型）</label>
      <select class="form-select" id="sub_catId">${catOpts||'<option value="">请先创建UGC类型的分类</option>'}</select>
      <div class="form-hint">选择哪个一级分类下显示投稿入口</div>
    </div>
    <div class="form-group"><label class="form-label">投稿邮箱</label><input class="form-input" id="sub_email" value="${s.email}"></div>
    <div class="form-group"><label class="form-label">投稿说明</label>
      <div class="form-hint">完整的投稿规则说明，包含格式要求、分辨率要求、邮件标题格式等，前端弹窗直接展示此内容</div>
      <textarea class="form-textarea" id="sub_content" style="min-height:200px">${s.content||''}</textarea>
    </div>
    <div class="form-group"><label class="form-label">状态</label>
      <select class="form-select" id="sub_status"><option value="true" ${s.status?'selected':''}>启用</option><option value="false" ${!s.status?'selected':''}>禁用</option></select>
    </div>
    <div style="text-align:right;margin-top:12px"><button class="btn btn-primary" onclick="saveSubmitConfig()">保存配置</button></div>
  </div></div>`;
}
function saveSubmitConfig(){
  DATA.submitConfig = {
    catId: parseInt(document.getElementById('sub_catId').value)||0,
    email: document.getElementById('sub_email').value,
    content: document.getElementById('sub_content').value,
    status: document.getElementById('sub_status').value==='true',
  };
  save(); toast('投稿配置已保存');
}

// =============================
// Modal Save Handler
// =============================
function handleAdd(){
  editingItem = null;
  switch(currentTab){
    case 'banner': openBannerModal(); break;
    case 'category': openCatModal(); break;
    case 'wallpaper': openWPModal(); break;
  }
}

function handleSave(){
  switch(currentTab){
    case 'banner': saveBanner(); break;
    case 'category': saveCat(); break;
    case 'wallpaper': saveWP(); break;
  }
}

function saveBanner(){
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.banners),
    img: document.getElementById('f_img').value,
    tag: document.getElementById('f_tag').value,
    link: document.getElementById('f_link').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
  };
  if(!obj.img){toast('请填写图片URL');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.banners.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function saveCat(){
  const subItems = [...document.querySelectorAll('#subCatList .sub-cat-item')].map((el,i)=>{
    const name = el.querySelector('.sub-name').value.trim();
    return name ? {id: (editingItem && editingItem.children && editingItem.children[i]) ? editingItem.children[i].id : Date.now()+i, name, sort:i+1, status:true} : null;
  }).filter(Boolean);
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.categories),
    name: document.getElementById('f_name').value,
    type: document.getElementById('f_type').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
    children: subItems,
  };
  if(!obj.name){toast('请填写分类名称');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.categories.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function saveWP(){
  const extFields = [...document.querySelectorAll('#extFieldList .ext-row')].map(el=>({
    key: el.querySelector('.ext-key').value.trim(),
    value: el.querySelector('.ext-val').value.trim(),
    show: el.querySelector('.ext-show').value==='true',
  })).filter(e=>e.key);
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.wallpapers),
    title: document.getElementById('f_title').value,
    catId: parseInt(document.getElementById('f_catId').value),
    thumb: document.getElementById('f_thumb').value,
    originalImg: document.getElementById('f_originalImg').value,
    authorAvatar: document.getElementById('f_authorAvatar').value,
    date: document.getElementById('f_date').value,
    badge: document.getElementById('f_badge').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
    extFields,
    resFiles: [...document.querySelectorAll('#resUploadList .res-upload-row')].map(row=>{
      const label = row.querySelector('.res-label-input').value.trim();
      const type = row.querySelector('.res-type-select').value;
      const url = row.querySelector('.res-url').value.trim();
      return label ? {label, type, url} : null;
    }).filter(Boolean),
  };
  if(!obj.title){toast('请填写标题');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.wallpapers.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function closeAdminModal(){
  document.getElementById('adminModal').classList.remove('show');
  editingItem = null;
}

// Close modal on mask click
document.getElementById('adminModal').addEventListener('click',e=>{
  if(e.target.id==='adminModal') closeAdminModal();
});

// ===== PRD Preview Bridge (postMessage) =====
window.addEventListener('message', e => {
  if(e.data.action === 'switchTab' && e.data.tab){
    switchTab(e.data.tab);
  }
  if(e.data.action === 'openEdit'){
    // Open the first wallpaper edit modal
    const tab = currentTab;
    switchTab('wallpaper');
    setTimeout(() => {
      const wp = DATA.wallpapers.find(w => w.status);
      if(wp){editWP(wp);currentTab = tab;}
    }, 400);
  }
});

// ===== Init =====
load();
renderCurrentTab();
</script>
</body>
</html>
