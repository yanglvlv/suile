<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNF壁纸站 · 配置后台</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f6fa;color:#333;min-height:100vh}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e2235;color:#b0b8d0;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto}
.sidebar-logo{padding:20px 24px;font-size:15px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,0.06);letter-spacing:1px}
.sidebar-logo small{display:block;font-size:11px;color:#5a6080;font-weight:400;margin-top:2px}
.sidebar-nav{padding:12px 0}
.nav-group-title{padding:8px 24px;font-size:11px;color:#4a5070;letter-spacing:2px;text-transform:uppercase}
.sidebar-link{
  display:flex;align-items:center;gap:10px;
  padding:10px 24px;font-size:13px;color:#8090b0;cursor:pointer;
  transition:all .2s;border-left:3px solid transparent;
}
.sidebar-link:hover{background:rgba(255,255,255,0.04);color:#c0c8e0}
.sidebar-link.active{background:rgba(80,144,255,0.08);color:#7eb6ff;border-left-color:#5090ff}
.sidebar-link svg{width:16px;height:16px;flex-shrink:0}

.main{margin-left:220px;flex:1;padding:0}
.topbar{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid #e8eaf0;
  padding:16px 32px;display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{font-size:16px;font-weight:600;color:#1a1e30}
.topbar-actions{display:flex;gap:8px}
.btn{
  padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid #dde0e8;background:#fff;color:#555;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:#bbc0d0;color:#333}
.btn-primary{background:#4070e0;color:#fff;border-color:#4070e0}
.btn-primary:hover{background:#3560d0}
.btn-danger{color:#e04040;border-color:#f0c0c0}
.btn-danger:hover{background:#fef0f0}
.btn-sm{padding:5px 12px;font-size:12px}

.content{padding:24px 32px}

/* Cards */
.card{background:#fff;border-radius:10px;border:1px solid #e8eaf0;margin-bottom:20px}
.card-header{
  padding:16px 20px;border-bottom:1px solid #f0f1f5;
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:600;color:#1a1e30}
.card-body{padding:20px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#8090b0;font-weight:500;border-bottom:1px solid #f0f1f5;font-size:12px;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f8f9fc;vertical-align:middle}
tr:hover td{background:#fafbfe}
.td-img{width:80px;height:45px;object-fit:cover;border-radius:4px;background:#f0f1f5}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-blue{background:#eef3ff;color:#4070e0}
.tag-green{background:#eefbf4;color:#30a060}
.tag-orange{background:#fff5ee;color:#d07020}
.tag-gray{background:#f0f1f5;color:#8090b0}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.status-on{background:#30c060}
.status-off{background:#ccc}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:6px}
.form-label .req{color:#e04040;margin-left:2px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:8px 12px;border:1px solid #dde0e8;border-radius:6px;
  font-size:13px;color:#333;background:#fff;transition:border-color .2s;
  font-family:inherit;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#4070e0}
.form-textarea{min-height:80px;resize:vertical}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.form-hint{font-size:11px;color:#aaa;margin-top:4px}

/* Rich Text Editor */
.rte-wrap{border:1px solid #dde0e8;border-radius:6px;overflow:hidden}
.rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;background:#f7f8fc;border-bottom:1px solid #e8eaf0}
.rte-btn{width:28px;height:28px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;font-size:13px;font-weight:600;transition:all .15s}
.rte-btn:hover{background:#e8ecf2;color:#333}
.rte-btn.active{background:#4070e0;color:#fff}
.rte-sep{width:1px;height:20px;background:#dde0e8;margin:4px 4px;align-self:center}
.rte-body{min-height:200px;max-height:400px;overflow-y:auto;padding:12px 14px;font-size:13px;color:#333;line-height:1.8;outline:none;background:#fff}
.rte-body:empty::before{content:attr(data-placeholder);color:#bbb;pointer-events:none}
.rte-body img{max-width:100%;border-radius:6px;margin:6px 0}
.rte-body blockquote{border-left:3px solid #4070e0;padding:6px 12px;margin:6px 0;background:#f8fafc;color:#555;border-radius:0 4px 4px 0}
.rte-body p{margin:0 0 4px}
.rte-body ul,.rte-body ol{padding-left:20px;margin:4px 0}

/* Modal */
.admin-modal{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;
  background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;
}
.admin-modal.show{display:flex}
.admin-modal-box{
  background:#fff;border-radius:12px;width:580px;max-height:85vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);
}
.admin-modal-header{
  padding:18px 24px;border-bottom:1px solid #f0f1f5;
  display:flex;align-items:center;justify-content:space-between;
}
.admin-modal-header h3{font-size:15px;font-weight:600}
.admin-modal-close{
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#999;font-size:18px;transition:all .2s;border:none;background:none;
}
.admin-modal-close:hover{background:#f0f1f5;color:#333}
.admin-modal-body{padding:20px 24px}
.admin-modal-footer{padding:16px 24px;border-top:1px solid #f0f1f5;display:flex;justify-content:flex-end;gap:8px}

/* 扩展字段 */
.ext-fields{margin-top:8px}
.ext-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.ext-row input{flex:1}
.ext-row .btn-sm{flex-shrink:0}
.ext-row select{width:80px;flex-shrink:0;padding:7px 6px;border:1px solid #dde0e8;border-radius:6px;font-size:12px}

/* 分辨率图片组 */
.res-upload-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;font-size:12px;color:#666;padding:8px 10px;border-radius:6px;border:1px solid #eee;background:#fafbfe}
.res-upload-row.checked{border-color:#c0d0ff;background:#f4f7ff}
.res-upload-row span.res-label{min-width:120px;display:flex;align-items:center;gap:6px}
.res-upload-row input[type="checkbox"]{accent-color:#4070e0}
.res-upload-row .res-type-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:#eef3ff;color:#4070e0}
.res-upload-row input[type="text"]{flex:1}

/* 子分类列表 */
.sub-cat-list{margin-top:8px;padding-left:12px}
.sub-cat-item{
  display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666;
}
.sub-cat-item input{flex:1;padding:5px 8px;border:1px solid #e0e2ea;border-radius:4px;font-size:12px}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}

/* 预览链接 */
.preview-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;color:#4070e0;cursor:pointer;
}
.preview-link:hover{text-decoration:underline}

/* Toast */
.toast{
  position:fixed;top:20px;right:20px;z-index:9999;
  padding:12px 20px;border-radius:8px;font-size:13px;
  background:#1e2235;color:#fff;opacity:0;transform:translateY(-10px);
  transition:all .3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}

/* Sortable handle */
.drag-handle{cursor:grab;color:#ccc;font-size:16px;user-select:none}
.drag-handle:hover{color:#888}
</style>
</head>

</div>

// ===== Load/Save =====
const DATA_VERSION = 'v2.4';
let DATA;
function load(){
  try{ DATA = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e){}
  if(!DATA || DATA._ver !== DATA_VERSION){ DATA = getDefaultData(); save(); }
}
function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
}
function resetAll(){
  if(!confirm('确定重置所有配置为默认数据？')) return;
  DATA = getDefaultData();
  save();
  renderCurrentTab();
  toast('已重置为默认数据');
}

// ===== Toast =====
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== Tab Switch =====
let currentTab = 'banner';
let editingItem = null;

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.toggle('active',l.dataset.tab===tab));
  const titles = {banner:'Banner管理',category:'分类管理',wallpaper:'壁纸管理',notice:'公告管理',activity:'活动管理',submit:'投稿配置'};
  document.getElementById('tabTitle').textContent = titles[tab];
  document.getElementById('addBtn').style.display = (tab==='submit')?'none':'';
  renderCurrentTab();
}

function renderCurrentTab(){
  const c = document.getElementById('tabContent');
  switch(currentTab){
    case 'banner': c.innerHTML = renderBannerTab(); break;
    case 'category': c.innerHTML = renderCategoryTab(); break;
    case 'wallpaper': c.innerHTML = renderWallpaperTab(); break;
    case 'notice': c.innerHTML = renderInfoTab('notice'); break;
    case 'activity': c.innerHTML = renderInfoTab('activity'); break;
    case 'submit': c.innerHTML = renderSubmitTab(); break;
  }
}

// ===== ID Generator =====
function nextId(arr){ return arr.length ? Math.max(...arr.map(a=>a.id))+1 : 1; }

// ===== Helpers =====
function getCatPath(catId){
  for(const c of DATA.categories){
    if(c.id===catId) return c.name;
    for(const sub of (c.children||[])){
      if(sub.id===catId) return c.name+' / '+sub.name;
    }
  }
  return '-';
}
function getAllCatOptions(){
  let opts=[];
  for(const c of DATA.categories){
    if((c.children||[]).length>0){
      for(const sub of c.children){
        opts.push({id:sub.id, label:c.name+' / '+sub.name});
      }
    }else{
      opts.push({id:c.id, label:c.name});
    }
  }
  return opts;
}

function renderBannerTab(){
  const rows = DATA.banners.sort((a,b)=>a.sort-b.sort).map(b=>`
    <tr>
      <td><span class="drag-handle">⠿</span></td>
      <td><img class="td-img" src="${b.img}" onerror="this.style.background='#e0e2ea'"></td>
      <td><span class="tag tag-blue">${b.tag||'-'}</span></td>
      <td style="font-size:12px;color:#999">${b.link||'无'}</td>
      <td><span class="status-dot ${b.status?'status-on':'status-off'}"></span>${b.status?'上线':'下线'}</td>
      <td>
        <button class="btn btn-sm" onclick="editBanner(${b.id})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="delBanner(${b.id})">删除</button>
      </td>
    </tr>
  `).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">Banner列表（${DATA.banners.length}）</span></div>
    <div class="table-wrap"><table><thead><tr><th width="30"></th><th>图片</th><th>标签(内部)</th><th>跳转链接</th><th>状态</th><th width="140">操作</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6"><div class="empty-state">暂无Banner，点击右上角新增</div></td></tr>'}</tbody></table></div></div>`;
}
function editBanner(id){ editingItem=DATA.banners.find(b=>b.id===id); openBannerModal(); }
function delBanner(id){ if(!confirm('确定删除？'))return; DATA.banners=DATA.banners.filter(b=>b.id!==id); save(); renderCurrentTab(); toast('已删除'); }

function openBannerModal(){
  const b = editingItem || {img:'',tag:'',link:'',sort:DATA.banners.length+1,status:true};
  document.getElementById('modalTitle').textContent = editingItem?'编辑Banner':'新增Banner';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label class="form-label">图片URL<span class="req">*</span></label><input class="form-input" id="f_img" value="${b.img}" placeholder="Banner图片地址（文字内容请直接P在图上）"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">标签（内部管理用，不对外展示）</label><input class="form-input" id="f_tag" value="${b.tag||''}" placeholder="如：版本KV、同人精选、周年庆"></div>
      <div class="form-group"><label class="form-label">跳转链接</label><input class="form-input" id="f_link" value="${b.link||''}" placeholder="可选，点击Banner跳转的地址"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">排序<span class="req">*</span></label><input class="form-input" id="f_sort" type="number" value="${b.sort}"></div>
      <div class="form-group"><label class="form-label">状态<span class="req">*</span></label>
        <select class="form-select" id="f_status"><option value="true" ${b.status?'selected':''}>上线</option><option value="false" ${!b.status?'selected':''}>下线</option></select>
      </div>
    </div>`;
  document.getElementById('adminModal').classList.add('show');
}

// =============================
// Category Tab
// =============================
function renderCategoryTab(){
  const rows = DATA.categories.sort((a,b)=>a.sort-b.sort).map(c=>{
    const subList = (c.children||[]).map(s=>
      `<span class="tag tag-gray" style="margin:2px">${s.name}</span>`
    ).join('') || '<span style="font-size:11px;color:#bbb">无二级分类</span>';
    return `<tr>
      <td><span class="drag-handle">⠿</span></td>
      <td><strong>${c.name}</strong></td>
      <td><span class="tag ${c.type==='ugc'?'tag-orange':'tag-blue'}">${c.type==='ugc'?'UGC投稿类':'普通'}</span></td>
      <td>${subList}</td>
      <td><span class="status-dot ${c.status?'status-on':'status-off'}"></span>${c.status?'显示':'隐藏'}</td>
      <td>
        <button class="btn btn-sm" onclick="editCat(${c.id})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="delCat(${c.id})">删除</button>
      </td>
    </tr>`;
  }).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">分类列表（${DATA.categories.length}）</span></div>
    <div class="table-wrap"><table><thead><tr><th width="30"></th><th>一级分类</th><th>类型</th><th>二级分类</th><th>状态</th><th width="140">操作</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6"><div class="empty-state">暂无分类</div></td></tr>'}</tbody></table></div></div>`;
}
function editCat(id){ editingItem=DATA.categories.find(c=>c.id===id); openCatModal(); }
function delCat(id){ if(!confirm('删除分类会导致关联壁纸失去分类，确定？'))return; DATA.categories=DATA.categories.filter(c=>c.id!==id); save(); renderCurrentTab(); toast('已删除'); }

function openCatModal(){
  const c = editingItem || {name:'',type:'normal',sort:DATA.categories.length+1,status:true,link:'',children:[]};
  const subs = (c.children||[]).map((s,i)=>
    `<div class="sub-cat-item" data-idx="${i}">
      <input value="${s.name}" class="sub-name" placeholder="二级分类名称">
      <input value="${s.link||''}" class="sub-link" placeholder="跳转URL（可选）" style="flex:1">
      <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button>
    </div>`
  ).join('');
  document.getElementById('modalTitle').textContent = editingItem?'编辑分类':'新增一级分类';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label class="form-label">分类名称<span class="req">*</span></label><input class="form-input" id="f_name" value="${c.name}"></div>
      <div class="form-group"><label class="form-label">类型<span class="req">*</span></label>
        <select class="form-select" id="f_type">
          <option value="normal" ${c.type==='normal'?'selected':''}>普通</option>
          <option value="ugc" ${c.type==='ugc'?'selected':''}>UGC投稿类</option>
        </select>
        <div class="form-hint">UGC类型的分类会显示投稿入口</div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">跳转链接</label><input class="form-input" id="f_link" value="${c.link||''}" placeholder="可选，配置后前台点击一级分类直接跳转此URL而非切换分类">
      <div class="form-hint">留空 = 正常切换分类；填写URL = 点击后新窗口打开该链接</div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">排序<span class="req">*</span></label><input class="form-input" id="f_sort" type="number" value="${c.sort}"></div>
      <div class="form-group"><label class="form-label">状态<span class="req">*</span></label>
        <select class="form-select" id="f_status"><option value="true" ${c.status?'selected':''}>显示</option><option value="false" ${!c.status?'selected':''}>隐藏</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">二级分类 <button class="btn btn-sm" onclick="addSubCat()" style="margin-left:8px">+ 添加</button></label>
      <div class="form-hint">不配置二级分类时，壁纸直接挂在一级分类下。每个二级分类可单独配跳转链接</div>
      <div class="sub-cat-list" id="subCatList">${subs}</div>
    </div>`;
  document.getElementById('adminModal').classList.add('show');
}
function addSubCat(){
  const list = document.getElementById('subCatList');
  const div = document.createElement('div');
  div.className='sub-cat-item';
  div.innerHTML=`<input value="" class="sub-name" placeholder="二级分类名称"><input value="" class="sub-link" placeholder="跳转URL（可选）" style="flex:1"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button>`;
  list.appendChild(div);
}

  const rows = filtered.map(w=>{

function editWP(id){ editingItem=DATA.wallpapers.find(w=>w.id===id); openWPModal(); }
function delWP(id){ if(!confirm('确定删除？'))return; DATA.wallpapers=DATA.wallpapers.filter(w=>w.id!==id); save(); renderCurrentTab(); toast('已删除'); }

const RES_PRESETS = [
  {label:'1920×1080',type:'横版'},{label:'1920×1200',type:'横版'},
  {label:'2560×1440',type:'横版'},{label:'3840×2160',type:'横版'},
  {label:'750×1334',type:'竖版'},{label:'1080×1920',type:'竖版'},
  {label:'1080×2340',type:'竖版'},{label:'1125×2436',type:'竖版'},
  {label:'1179×2556',type:'竖版'},
];

function refreshPresets(){
  const box = document.getElementById('resPresets');
  if(!box) return;
  const usedLabels = [...document.querySelectorAll('#resUploadList .res-label-input')].map(el=>el.value.trim());
  box.innerHTML = RES_PRESETS.filter(p=>!usedLabels.includes(p.label)).map(p=>
    `<button class="btn btn-sm" style="font-size:11px;padding:3px 10px" onclick="addResPreset('${p.label}','${p.type}')">${p.label} (${p.type})</button>`
  ).join('');
}

function addResPreset(label, type){
  addResRow(label, type);
  refreshPresets();
}

function addResRow(label, type){
  label = label||''; type = type||'横版';
  const list = document.getElementById('resUploadList');
  const div = document.createElement('div');
  div.className='res-upload-row checked';
  div.innerHTML=`
    <input type="text" class="form-input res-label-input" value="${label}" placeholder="分辨率 如1920×1080" style="width:140px;flex:none">
    <select class="form-select res-type-select" style="width:80px;flex:none"><option value="横版" ${type==='横版'?'selected':''}>横版</option><option value="竖版" ${type==='竖版'?'selected':''}>竖版</option></select>

  list.appendChild(div);
}

function getInfoArr(type){ return type==='notice' ? (DATA.notices||(DATA.notices=[])) : (DATA.activities||(DATA.activities=[])); }
function getInfoTitle(type){ return type==='notice' ? '公告' : '活动'; }

function renderInfoTab(type){
  const arr = getInfoArr(type);
  const title = getInfoTitle(type);
  const rows = arr.filter(a=>true).sort((a,b)=>(a.sort||99)-(b.sort||99)).map(item=>`
    <tr>
      <td><strong>${item.text}</strong></td>
      <td>${item.tag?`<span class="tag tag-blue">${item.tag.toUpperCase()}</span>`:'-'}</td>
      <td>${item.date||'-'}</td>
      <td>${item.sort!=null?item.sort:'-'}</td>
      <td><span class="status-dot ${item.status?'status-on':'status-off'}"></span>${item.status?'上线':'下线'}</td>
      <td>
        <button class="btn btn-sm" onclick="editInfo('${type}',${item.id})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="delInfo('${type}',${item.id})">删除</button>
      </td>
    </tr>
  `).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">${title}列表（${arr.length}）</span></div>
    <div class="table-wrap"><table><thead><tr><th>标题</th><th>标签</th><th>日期</th><th>排序</th><th>状态</th><th width="140">操作</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="6"><div class="empty-state">暂无${title}</div></td></tr>`}</tbody></table></div></div>`;
}

function editInfo(type,id){ editingItem=getInfoArr(type).find(i=>i.id===id); openInfoModal(type); }
function delInfo(type,id){ if(!confirm('确定删除？'))return; const arr=getInfoArr(type); const idx=arr.findIndex(i=>i.id===id); if(idx>-1)arr.splice(idx,1); save(); renderCurrentTab(); toast('已删除'); }

function openInfoModal(type){
  const title = getInfoTitle(type);
  const item = editingItem || {text:'',date:'',tag:'',sort:'',status:true,content:''};
  const defSort = editingItem ? item.sort : (getInfoArr(type).length + 1);
  // 兼容旧纯文本数据：如果content不含HTML标签，则将换行转为<br>
  let contentHtml = item.content || '';
  if(contentHtml && !/<[a-z][\s\S]*>/i.test(contentHtml)){
    contentHtml = contentHtml.replace(/\n/g,'<br>');
  }
  document.getElementById('modalTitle').textContent = editingItem?`编辑${title}`:`新增${title}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label class="form-label">标题<span class="req">*</span></label><input class="form-input" id="f_text" value="${item.text}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">日期<span class="req">*</span></label><input class="form-input" id="f_date" value="${item.date}" placeholder="如 2026/04/10"></div>
      <div class="form-group"><label class="form-label">标签</label><input class="form-input" id="f_tag" value="${item.tag||''}" placeholder="可选：new、hot"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">排序<span class="req">*</span></label><input class="form-input" id="f_sort" type="number" value="${defSort}" placeholder="数字越小越靠前"></div>
      <div class="form-group"><label class="form-label">状态<span class="req">*</span></label>
        <select class="form-select" id="f_status"><option value="true" ${item.status?'selected':''}>上线</option><option value="false" ${!item.status?'selected':''}>下线</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">详情内容<span class="req">*</span></label>
      <div class="form-hint">支持富文本编辑：加粗、斜体、标题、列表、插入图片等</div>
      <div class="rte-wrap">
        <div class="rte-toolbar">
          <button class="rte-btn" title="加粗" onclick="rteCmd('bold')"><b>B</b></button>
          <button class="rte-btn" title="斜体" onclick="rteCmd('italic')"><i>I</i></button>
          <button class="rte-btn" title="下划线" onclick="rteCmd('underline')"><u>U</u></button>
          <span class="rte-sep"></span>
          <button class="rte-btn" title="标题" onclick="rteCmd('formatBlock','H3')" style="font-size:12px">H</button>
          <button class="rte-btn" title="引用" onclick="rteCmd('formatBlock','BLOCKQUOTE')" style="font-size:14px">❝</button>
          <span class="rte-sep"></span>
          <button class="rte-btn" title="无序列表" onclick="rteCmd('insertUnorderedList')" style="font-size:14px">•≡</button>
          <button class="rte-btn" title="有序列表" onclick="rteCmd('insertOrderedList')" style="font-size:12px">1.</button>
          <span class="rte-sep"></span>
          <button class="rte-btn" title="插入图片" onclick="rteInsertImage()" style="font-size:14px">🖼</button>
          <button class="rte-btn" title="插入链接" onclick="rteInsertLink()" style="font-size:13px">🔗</button>
          <span class="rte-sep"></span>
          <button class="rte-btn" title="文字颜色" onclick="rteColor()" style="font-size:13px;color:#e04040">A</button>
          <button class="rte-btn" title="清除格式" onclick="rteCmd('removeFormat')" style="font-size:12px">✕</button>
        </div>
        <div class="rte-body" id="f_content_rte" contenteditable="true" data-placeholder="请输入详情内容...">${contentHtml}</div>
      </div>
    </div>`;
  document.getElementById('adminModal').classList.add('show');
}

function saveInfo(type){
  const arr = getInfoArr(type);
  const obj = {
    id: editingItem ? editingItem.id : nextId(arr),
    text: document.getElementById('f_text').value,
    date: document.getElementById('f_date').value,
    tag: document.getElementById('f_tag').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
    content: document.getElementById('f_content_rte').innerHTML.trim(),
  };
  if(!obj.text){toast('请填写标题');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ arr.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

// ===== Rich Text Editor Helpers =====
function rteCmd(cmd, val){
  document.execCommand(cmd, false, val||null);
  document.getElementById('f_content_rte').focus();
}
function rteInsertImage(){
  const url = prompt('请输入图片URL：');
  if(url) document.execCommand('insertImage', false, url);
}
function rteInsertLink(){
  const url = prompt('请输入链接URL：','https://');
  if(url) document.execCommand('createLink', false, url);
}
function rteColor(){
  const color = prompt('请输入颜色值（如 #e04040、red）：','#e04040');
  if(color) document.execCommand('foreColor', false, color);
}

// Modal Save Handler
// =============================
function handleAdd(){
  editingItem = null;
  switch(currentTab){
    case 'banner': openBannerModal(); break;
    case 'category': openCatModal(); break;
    case 'wallpaper': openWPModal(); break;
    case 'notice': openInfoModal('notice'); break;
    case 'activity': openInfoModal('activity'); break;
  }
}

function handleSave(){
  switch(currentTab){
    case 'banner': saveBanner(); break;
    case 'category': saveCat(); break;
    case 'wallpaper': saveWP(); break;
    case 'notice': saveInfo('notice'); break;
    case 'activity': saveInfo('activity'); break;
  }
}

function saveBanner(){
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.banners),
    img: document.getElementById('f_img').value,
    tag: document.getElementById('f_tag').value,
    link: document.getElementById('f_link').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
  };
  if(!obj.img){toast('请填写图片URL');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.banners.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function saveCat(){
  const subItems = [...document.querySelectorAll('#subCatList .sub-cat-item')].map((el,i)=>{
    const name = el.querySelector('.sub-name').value.trim();
    const link = el.querySelector('.sub-link') ? el.querySelector('.sub-link').value.trim() : '';
    return name ? {id: (editingItem && editingItem.children && editingItem.children[i]) ? editingItem.children[i].id : Date.now()+i, name, sort:i+1, status:true, link} : null;
  }).filter(Boolean);
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.categories),
    name: document.getElementById('f_name').value,
    type: document.getElementById('f_type').value,
    link: document.getElementById('f_link').value.trim(),
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
    children: subItems,
  };
  if(!obj.name){toast('请填写分类名称');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.categories.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function saveWP(){
  const extFields = [...document.querySelectorAll('#extFieldList .ext-row')].map(el=>({
    key: el.querySelector('.ext-key').value.trim(),
    value: el.querySelector('.ext-val').value.trim(),
    show: el.querySelector('.ext-show').value==='true',
  })).filter(e=>e.key);
  const obj = {
    id: editingItem ? editingItem.id : nextId(DATA.wallpapers),
    title: document.getElementById('f_title').value,
    catId: parseInt(document.getElementById('f_catId').value),
    thumb: document.getElementById('f_thumb').value,
    orient: document.getElementById('f_orient').value,
    originalImg: document.getElementById('f_originalImg').value,
    authorAvatar: document.getElementById('f_authorAvatar').value,
    date: document.getElementById('f_date').value,
    badge: document.getElementById('f_badge').value,
    sort: parseInt(document.getElementById('f_sort').value)||1,
    status: document.getElementById('f_status').value==='true',
    extFields,
    resFiles: [...document.querySelectorAll('#resUploadList .res-upload-row')].map(row=>{
      const label = row.querySelector('.res-label-input').value.trim();
      const type = row.querySelector('.res-type-select').value;
      const url = row.querySelector('.res-url').value.trim();
      return label ? {label, type, url} : null;
    }).filter(Boolean),
  };
  if(!obj.title){toast('请填写标题');return}
  if(editingItem){ Object.assign(editingItem, obj); }
  else{ DATA.wallpapers.push(obj); }
  save(); closeAdminModal(); renderCurrentTab(); toast('已保存');
}

function closeAdminModal(){
  document.getElementById('adminModal').classList.remove('show');
  editingItem = null;
}

// ===== PRD Preview Bridge (postMessage) =====
window.addEventListener('message', e => {
  if(e.data.action === 'switchTab' && e.data.tab){
    switchTab(e.data.tab);
  }
  if(e.data.action === 'openEdit'){
    // Open the first wallpaper edit modal
    const tab = currentTab;
    switchTab('wallpaper');
    setTimeout(() => {
      const wp = DATA.wallpapers.find(w => w.status);
      if(wp){editWP(wp);currentTab = tab;}
    }, 400);
  }
});

// ===== Init =====
load();
renderCurrentTab();
</script>
