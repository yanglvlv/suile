<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="《地下城与勇士:创新世纪》是全球2D横版格斗网络游戏（MMOACT）的先行者。无限连击的动作特性、极富多样化的职业分支、精准的操作与多样化副本体验，让玩家全方位体验打击爽快感。" />
<meta name="keywords" content="地下城与勇士:创新世纪,DNF,Dungeon&Fighter,DF,D&F,地下城,勇士,名将,三国志,横版,2D,腾讯游戏,免费,ACT,转职,觉醒,冒险家,鬼剑士,格斗,格斗家,神枪手,枪手,圣职,红眼,白手,鬼气,阿修罗,气功师,大枪,漫游,阿拉德" />
<title>地下城与勇士壁纸站-地下城与勇士:创新世纪-DNF-官方网站-腾讯游戏</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Microsoft YaHei","PingFang SC",-apple-system,sans-serif;background:#f4f6f9;color:#333;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
img{display:block}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f0f2f5}
::-webkit-scrollbar-thumb{background:#ccd0da;border-radius:3px}

.bg-particles{display:none}

/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid #e8ecf2;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.header-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px}
.logo-text{font-size:16px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#3b7ddd,#6c5ce7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:#a0a8b8;margin-left:4px;letter-spacing:1px}
.main-nav{display:flex;align-items:center;gap:4px}
.main-nav-item{position:relative;padding:8px 22px;font-size:14px;font-weight:500;color:#8090a8;border-radius:8px;transition:all .25s;letter-spacing:0.5px}
.main-nav-item:hover{color:#3b7ddd;background:rgba(59,125,221,0.05)}
.main-nav-item.active{color:#3b7ddd;font-weight:600}
.main-nav-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2.5px;border-radius:2px;background:#3b7ddd}

/* 底部海量作品提示 */
.ugc-bottom-tip{max-width:1320px;margin:32px auto 0;padding:0 32px}
.ugc-bottom-inner{position:relative;border-radius:16px;padding:32px 40px;text-align:center;background:linear-gradient(135deg,#f0f5ff 0%,#e8eeff 50%,#f5f0ff 100%);border:1px solid rgba(59,125,221,0.12);overflow:hidden}
.ugc-bottom-inner::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(59,125,221,0.06)}
.ugc-bottom-inner::after{content:'';position:absolute;bottom:-30px;left:-30px;width:80px;height:80px;border-radius:50%;background:rgba(108,92,231,0.05)}
.ugc-bottom-title{font-size:16px;font-weight:700;color:#2c3e50;margin-bottom:6px;letter-spacing:1px}
.ugc-bottom-title span{background:linear-gradient(135deg,#3b7ddd,#6c5ce7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ugc-bottom-desc{font-size:12px;color:#8090a8;letter-spacing:0.5px}
.ugc-bottom-line{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px}
.ugc-bottom-line::before,.ugc-bottom-line::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(59,125,221,0.3),transparent)}

/* 搜索分组 */
.search-group{margin-bottom:28px}
.search-group-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8ecf2}
.search-group-icon{font-size:16px}
.search-group-title{font-size:15px;font-weight:700;color:#2c3e50;letter-spacing:0.5px}
.search-group-count{font-size:12px;color:#a0a8b8;margin-left:auto;background:#f0f2f6;padding:2px 10px;border-radius:10px}
.search-group-grid{display:flex;flex-direction:column;gap:12px}
.search-result-flat{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.search-result-flat .wp-card{position:relative;height:160px}
.search-result-flat .wp-card-img{position:absolute;inset:0}
.search-wrap{display:flex;align-items:center;background:#f0f2f6;border:1px solid #e4e8ee;border-radius:22px;padding:6px 16px;gap:8px;transition:all .3s}
.search-wrap:focus-within{border-color:#3b7ddd;background:#fff;box-shadow:0 0 0 3px rgba(59,125,221,0.08)}
.search-wrap svg{width:15px;height:15px;color:#a0a8b8;flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;color:#333;font-size:13px;width:160px}
.search-wrap input::placeholder{color:#b0b8c8}

/* Hero Carousel */
.hero{position:relative;width:100%;margin-top:60px;overflow:hidden;padding:12px 0 8px;background:#f4f6f9}
.hero-track{display:flex;align-items:center;justify-content:center;position:relative;height:0;padding-top:22%;max-width:1320px;margin:0 auto}
.hero-slide{
  position:absolute;top:0;border-radius:14px;overflow:hidden;cursor:pointer;
  transition:all .5s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 30px rgba(0,0,0,0.12);
  width:60%;padding-top:33.75%;/* 16:9 of 60% width */
}
.hero-slide img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.hero-slide a{position:absolute;inset:0;z-index:1}
/* Center */
.hero-slide.center{left:20%;z-index:3;transform:scale(1);opacity:1;box-shadow:0 12px 48px rgba(0,0,0,0.18)}
/* Left peek */
.hero-slide.left{left:-5%;z-index:1;transform:scale(0.82);opacity:0.5;filter:brightness(0.7)}
/* Right peek */
.hero-slide.right{left:45%;z-index:1;transform:scale(0.82);opacity:0.5;filter:brightness(0.7)}
/* Hidden */
.hero-slide.hidden{left:20%;z-index:0;transform:scale(0.7);opacity:0;pointer-events:none}
.hero-controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:8px}
.hero-dot{width:20px;height:3px;border-radius:2px;background:rgba(0,0,0,0.15);cursor:pointer;transition:all .3s}
.hero-dot.active{width:36px;background:#3b7ddd}
.hero-nav-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);border:1px solid #e0e4ea;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.hero-nav-btn:hover{background:#fff;color:#3b7ddd;box-shadow:0 4px 16px rgba(59,125,221,0.15)}

/* Filter */
.filter-bar{max-width:1320px;margin:0 auto;padding:24px 32px 0;display:flex;align-items:center;justify-content:space-between}
.category-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:7px 20px;border-radius:20px;font-size:13px;font-weight:500;color:#8090a8;transition:all .25s;letter-spacing:0.5px;border:1px solid transparent}
.cat-tab:hover{color:#3b7ddd;background:rgba(59,125,221,0.04)}
.cat-tab.active{color:#fff;background:#3b7ddd;border-color:#3b7ddd;font-weight:600}

/* Submit bar */
.submit-bar{max-width:1320px;margin:16px auto 0;padding:0 32px;display:none}
.submit-bar.show{display:block}
.submit-card{background:linear-gradient(135deg,#eef4ff,#f0ecff);border:1px solid #d8e2ff;border-radius:14px;padding:20px 28px;display:flex;align-items:center;justify-content:space-between}
.submit-card h4{font-size:15px;font-weight:600;color:#3b5998;margin-bottom:4px}
.submit-card p{font-size:12px;color:#8090a8}
.submit-btn{padding:9px 28px;border-radius:22px;font-size:13px;font-weight:600;background:#3b7ddd;color:#fff;transition:all .3s;flex-shrink:0;letter-spacing:0.5px}
.submit-btn:hover{background:#2d6bc4;box-shadow:0 4px 16px rgba(59,125,221,0.25)}

/* UGC Extra: 公告+活动区 */
.ugc-extra{max-width:1320px;margin:16px auto 0;padding:0 32px;display:none}
.ugc-extra.show{display:block}
.ugc-extra-inner{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ugc-notice-card,.ugc-activity-card{background:#fff;border-radius:12px;border:1px solid #eaeef4;padding:16px 20px;min-height:140px}
.ugc-card-header{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#2c3e50;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f0f2f5}
.ugc-notice-list,.ugc-activity-list{display:flex;flex-direction:column;gap:8px}
.ugc-notice-item,.ugc-activity-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f8f9fc;font-size:13px;color:#4a5568;cursor:pointer;transition:color .2s}
.ugc-notice-item:hover,.ugc-activity-item:hover{color:#3b7ddd}
.ugc-notice-item:last-child,.ugc-activity-item:last-child{border-bottom:none}
.ugc-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ugc-notice-item .ugc-item-dot{background:#3b7ddd}
.ugc-activity-item .ugc-item-dot{background:#e67e22}
.ugc-item-text{flex:1;line-height:1.5}
.ugc-item-date{font-size:11px;color:#a0a8b8;flex-shrink:0;margin-top:1px}
.ugc-item-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:6px}
.ugc-item-tag.hot{background:#fef0e0;color:#d97706}
.ugc-item-tag.new{background:#eef3ff;color:#3b7ddd}
.ugc-more-btn{margin-left:auto;font-size:12px;color:#3b7ddd;cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 0;transition:opacity .2s}
.ugc-more-btn:hover{opacity:0.7}
.ugc-detail-content{width:560px;max-height:80vh;background:#fff;border-radius:16px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow-y:auto}
.ugc-detail-content h3{font-size:18px;font-weight:700;color:#2c3e50;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ugc-detail-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .2s;margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:8px}
.ugc-detail-item:hover{background:#f7f9fc}
.ugc-detail-item:last-child{border-bottom:none}
.ugc-detail-item .ugc-item-dot{margin-top:7px}
.ugc-detail-item .d-text{flex:1;font-size:14px;color:#333;line-height:1.6}
.ugc-detail-item .d-date{font-size:12px;color:#a0a8b8;flex-shrink:0;margin-top:2px}

/* Route Page */
.route-page{max-width:900px;margin:0 auto;padding:80px 32px 60px;min-height:80vh}
.route-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3b7ddd;cursor:pointer;margin-bottom:20px;padding:6px 0;border:none;background:none;font-family:inherit;transition:opacity .2s}
.route-back:hover{opacity:0.7}
.route-page-title{font-size:22px;font-weight:700;color:#2c3e50;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.route-list-item{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;background:#fff;border:1px solid #eaeef4;border-radius:12px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.route-list-item:hover{border-color:#c8d8f0;box-shadow:0 4px 16px rgba(0,0,0,0.04);transform:translateX(4px)}
.route-list-item .r-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.route-list-item .r-body{flex:1}
.route-list-item .r-title{font-size:15px;font-weight:600;color:#2c3e50;margin-bottom:4px}
.route-list-item .r-date{font-size:12px;color:#a0a8b8}
.route-list-item .r-arrow{color:#c0c8d8;font-size:18px;margin-top:2px}

/* Detail page */
.route-detail-title{font-size:20px;font-weight:700;color:#2c3e50;margin-bottom:8px}
.route-detail-meta{font-size:13px;color:#a0a8b8;margin-bottom:24px;display:flex;gap:12px}
.route-detail-body{background:#fff;border:1px solid #eaeef4;border-radius:14px;padding:28px 32px;font-size:14px;color:#4a5568;line-height:2}
.route-detail-body img{max-width:100%;border-radius:8px;margin:8px 0}
.route-detail-body p{margin:0 0 8px}
.route-detail-body ul,.route-detail-body ol{padding-left:20px;margin:8px 0}
.route-detail-body blockquote{border-left:3px solid #3b7ddd;padding:8px 14px;margin:8px 0;background:#f8fafc;color:#555;border-radius:0 6px 6px 0}

/* Grid */
.grid-section{max-width:1320px;margin:0 auto;padding:14px 32px 30px}
.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.grid-count{font-size:12px;color:#a0a8b8}
.wallpaper-grid{display:flex;flex-direction:column;gap:12px}
/* 分组行：1大+4小 */
.grid-row{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:10px;height:280px}
.grid-row .wp-card-big{grid-row:1/3;grid-column:span 2}
.grid-row-right .wp-card-big{grid-column:3/5}
.grid-row-right .wp-card:not(.wp-card-big):nth-child(1){grid-column:1;grid-row:1}
.grid-row-right .wp-card:not(.wp-card-big):nth-child(2){grid-column:2;grid-row:1}
.grid-row-right .wp-card:not(.wp-card-big):nth-child(3){grid-column:1;grid-row:2}
.grid-row-right .wp-card:not(.wp-card-big):nth-child(4){grid-column:2;grid-row:2}
/* 尾部行：全部等大4列 */
.grid-row-flat{grid-template-rows:1fr;height:150px}
/* 卡片 */
.wp-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;background:#1a1a2e;animation:fadeUp .4s ease both}
/* 瀑布流模式（同人画廊） */
.wallpaper-grid.masonry{display:block;column-count:4;column-gap:12px}
.masonry .wp-card{break-inside:avoid;margin-bottom:12px;display:inline-block;width:100%;background:linear-gradient(135deg,#2a2a3e,#1a1a2e)}
.masonry .wp-card-img{position:relative;width:100%;overflow:hidden}
.masonry .wp-card-img img{width:100%;height:auto;display:block;max-height:360px;object-fit:cover}
.wp-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.15)}
.wp-card-img{position:absolute;inset:0;overflow:hidden}
.wp-card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
/* Hover效果 */
.wp-card:hover .wp-card-img img{transform:scale(1.05)}
.wp-card-hover{display:none}
.wp-badge{position:absolute;top:8px;left:8px;z-index:3;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.5px;background:#3b7ddd;color:#fff}
.wp-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 12px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.7));color:#fff;pointer-events:none;z-index:1}
.wp-card-overlay .wp-card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;margin:0}
.wp-card-overlay .wp-card-meta{font-size:10px;color:rgba(255,255,255,0.6);margin-top:2px}
.wp-card-overlay .wp-card-author{display:flex;align-items:center;gap:4px;margin-top:3px}
.wp-card-overlay .wp-card-avatar{width:14px;height:14px;border-radius:50%;object-fit:cover;flex-shrink:0}
.wp-card-overlay .wp-card-author-name{font-size:9px;color:rgba(255,255,255,0.6)}
.wp-card-info{display:none}
.wp-card-author{display:flex;align-items:center;gap:4px;margin-top:3px}
.wp-card-avatar{width:14px;height:14px;border-radius:50%;object-fit:cover;background:#e8ecf2;flex-shrink:0}
.wp-card-author-name{font-size:9px;color:rgba(255,255,255,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:32px 0 8px}
.page-btn{
  min-width:36px;height:36px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  color:#6a7a90;border:1px solid #e0e4ea;background:#fff;
  transition:all .2s;padding:0 10px;
}
.page-btn:hover{border-color:#3b7ddd;color:#3b7ddd;background:#f0f5ff}
.page-btn.active{background:#3b7ddd;border-color:#3b7ddd;color:#fff;font-weight:600}
.page-btn.disabled{opacity:0.3;pointer-events:none}
.page-info{font-size:12px;color:#a0a8b8;margin-left:12px}

.empty-msg{text-align:center;padding:60px 20px;color:#b0b8c8;font-size:14px}

/* Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;opacity:0;transition:opacity .3s}
.modal.show{display:flex;opacity:1;align-items:center;justify-content:center}
.modal-close{position:absolute;top:20px;right:28px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;transition:all .2s;z-index:1}
.modal-close:hover{background:rgba(255,255,255,0.3)}
.modal-layout{display:flex;gap:24px;max-width:1140px;width:92%;max-height:88vh}
.modal-preview{flex:1;display:flex;align-items:center;justify-content:center;min-width:0;position:relative;overflow:hidden}
.modal-preview img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.3);transition:transform .2s ease}
/* Zoom controls */
.modal-zoom-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:3;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border-radius:20px;padding:6px 14px;border:1px solid rgba(255,255,255,0.15)}
.modal-zoom-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;transition:all .2s}
.modal-zoom-btn:hover{background:rgba(255,255,255,0.3)}
.modal-zoom-pct{color:#fff;font-size:12px;font-weight:600;min-width:40px;text-align:center}
.modal-arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transition:all .2s;z-index:2}
.modal-arrow:hover{background:rgba(255,255,255,0.4)}
.modal-arrow.prev{left:12px}
.modal-arrow.next{right:12px}
.modal-side{width:300px;flex-shrink:0;background:#fff;border-radius:14px;padding:24px;display:flex;flex-direction:column;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.modal-side-title{font-size:18px;font-weight:700;color:#2c3e50;margin-bottom:6px;line-height:1.4}
.modal-side-date{font-size:12px;color:#a0a8b8;margin-bottom:20px}
.modal-info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
.modal-info-label{color:#8090a8}
.modal-info-value{color:#2c3e50;font-weight:500}
.dl-section{margin-top:auto;padding-top:20px}
.dl-title{font-size:14px;font-weight:600;color:#2c3e50;margin-bottom:12px}
.dl-group-title{font-size:11px;color:#a0a8b8;margin:12px 0 8px;letter-spacing:1px;text-transform:uppercase}
.dl-list{display:flex;flex-direction:column;gap:6px}
.dl-item{display:flex;align-items:center;justify-content:space-between;padding:0;border-radius:10px;background:#f7f9fc;border:1px solid #eaeef4;transition:all .2s;overflow:hidden}
.dl-item-info{flex:1;padding:10px 14px;cursor:pointer;transition:background .2s}
.dl-item-info:hover{background:#eef4ff}
.dl-item-info .dl-label{font-size:13px;color:#4a5568;font-weight:500}
.dl-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;border-left:1px solid #eaeef4}
.dl-icon:hover{background:#3b7ddd}
.dl-icon:hover svg{color:#fff}

      {id:1,text:'同人画廊投稿规则更新，新增"漫画"类别',date:'2026/04/08',tag:'',status:true,sort:1,content:'为丰富同人画廊内容形式，现新增"漫画"投稿类别。\n\n【新增内容】\n· 支持多格漫画投稿（最多20页）\n· 漫画作品将在画廊中以独立标签展示\n· 漫画投稿同样需遵循现有投稿规则\n\n【生效时间】\n即日起生效，欢迎各位创作者踊跃投稿！'},
      {id:2,text:'2026年Q2精选同人作品征集中，截止5月31日',date:'2026/04/01',tag:'new',status:true,sort:2,content:'2026年第二季度精选同人作品征集正式启动！\n\n【征集时间】\n2026年4月1日 - 2026年5月31日\n\n【参与方式】\n通过投稿邮箱提交作品，邮件标题注明"Q2精选投稿"\n\n【评选规则】\n· 由官方运营团队从所有投稿中评选\n· 入选作品将获得"精选"标签和首页推荐位\n· 每季度评选10-15幅优秀作品\n\n【奖励】\n入选作者将获得DNF限定周边礼包一份'},

// ===== Init =====
function init(){
  load();
  if(!DATA) DATA = getDefaultData();
  
  const cats = DATA.categories.filter(c=>c.status).sort((a,b)=>a.sort-b.sort);
  if(cats.length>0){
    activeCatId = cats[0].id;
    const firstCat = cats[0];
    const subs = (firstCat.children||[]).filter(s=>s.status);
    activeSubCatId = subs.length>0 ? null : null; // null = 全部
  }
  
  renderNav();
  renderBanner();
  renderCatTabs();
  renderSubmitBar();
  renderGrid();
}

// ===== Nav (一级分类) =====

  const nav = document.getElementById('mainNav');
  const cats = DATA.categories.filter(c=>c.status).sort((a,b)=>a.sort-b.sort);
  const icons = {
    normal:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
    ugc:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:-2px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
  };

    }

// ===== Banner Carousel =====
let slideIdx=0, slideTimer=null, bannerList=[];

function renderBanner(){
  bannerList = DATA.banners.filter(b=>b.status).sort((a,b)=>a.sort-b.sort);
  const hero = document.getElementById('heroSection');
  if(bannerList.length===0){
    hero.innerHTML='<div style="height:100px"></div>';
    return;
  }
  const slides = bannerList.map((b,i)=>
    `<div class="hero-slide hidden" data-idx="${i}"><img src="${b.img}" alt="">${b.link?`<a href="${b.link}"></a>`:''}</div>`
  ).join('');
  const dots = bannerList.map((_,i)=>
    `<div class="hero-dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`
  ).join('');
  hero.innerHTML = `
    <div class="hero-track">${slides}</div>
    <div class="hero-controls">
      <button class="hero-nav-btn" onclick="prevSlide()">‹</button>
      ${dots}
      <button class="hero-nav-btn" onclick="nextSlide()">›</button>
    </div>
  `;
  slideIdx=0;
  updateSlidePositions();
  clearInterval(slideTimer);
  if(bannerList.length>1) slideTimer=setInterval(nextSlide,5000);
}

function updateSlidePositions(){
  const slides = document.querySelectorAll('.hero-slide');
  const n = bannerList.length;
  slides.forEach((s,i)=>{
    s.className = 'hero-slide';
    if(i===slideIdx){
      s.classList.add('center');
    } else if(i===(slideIdx-1+n)%n){
      s.classList.add('left');
    } else if(i===(slideIdx+1)%n){
      s.classList.add('right');
    } else {
      s.classList.add('hidden');
    }
  });
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===slideIdx));
}

function goSlide(i){
  clearInterval(slideTimer);
  slideIdx=i;
  updateSlidePositions();
  if(bannerList.length>1) slideTimer=setInterval(nextSlide,5000);
}
function nextSlide(){goSlide((slideIdx+1)%bannerList.length)}
function prevSlide(){goSlide((slideIdx-1+bannerList.length)%bannerList.length)}

// ===== Category Tabs (二级分类) =====
function switchCat(catId){
  activeCatId=catId;
  activeSubCatId=null;
  currentPage=1;
  isSearchMode=false;
  document.getElementById('searchInput').value='';
  renderNav();
  renderCatTabs();
  renderSubmitBar();
  renderGrid();
}

function renderCatTabs(){
  const cat = DATA.categories.find(c=>c.id===activeCatId);
  if(!cat) return;
  const subs = (cat.children||[]).filter(s=>s.status).sort((a,b)=>a.sort-b.sort);
  const tabs = document.getElementById('catTabs');
  if(subs.length===0){
    tabs.innerHTML='';
    return;
  }
  tabs.innerHTML = `<button class="cat-tab ${activeSubCatId===null?'active':''}" onclick="switchSubCat(null)">全部</button>`
    + subs.map(s=>{
      if(s.link){
        return `<a class="cat-tab" href="${s.link}" target="_blank">${s.name}</a>`;
      }
      return `<button class="cat-tab ${activeSubCatId===s.id?'active':''}" onclick="switchSubCat(${s.id})">${s.name}</button>`;
    }).join('');
}

function switchSubCat(subId){
  activeSubCatId=subId;
  currentPage=1;
  renderCatTabs();
  renderGrid();
}

// ===== Grid =====
function getVisibleWallpapers(){
  const cat = DATA.categories.find(c=>c.id===activeCatId);
  if(!cat) return [];
  const subs = (cat.children||[]).filter(s=>s.status);
  let validCatIds = [];
  if(subs.length===0){
    validCatIds=[cat.id];
  } else if(activeSubCatId===null){
    validCatIds = subs.map(s=>s.id);
  } else {
    validCatIds = [activeSubCatId];
  }
  return DATA.wallpapers.filter(w=>w.status && validCatIds.includes(w.catId)).sort((a,b)=>a.sort-b.sort);
}

function renderGrid(list){
  const allData = list || getVisibleWallpapers();
  
  if(isSearchMode && list){
    // 搜索模式：按一级分类分组显示
    grid.classList.remove('masonry');
    currentList = allData;
    const grouped = {};
    const catMap = {};
    // 构建catId -> 一级分类映射
    DATA.categories.filter(c=>c.status).forEach(c=>{
      if((c.children||[]).length>0){
        c.children.filter(s=>s.status).forEach(s=>{ catMap[s.id]={parentId:c.id,parentName:c.name,subName:s.name,type:c.type}; });
      } else {
        catMap[c.id]={parentId:c.id,parentName:c.name,subName:'',type:c.type};
      }
    });
    allData.forEach(w=>{
      const info = catMap[w.catId];
      if(!info) return;
      const key = info.parentId;
      if(!grouped[key]) grouped[key]={name:info.parentName,type:info.type,items:[]};
      grouped[key].items.push(w);
    });
    
    let html = '';
    const groups = Object.values(grouped);
    groups.forEach(g=>{
      html += `<div class="search-group">
        <div class="search-group-header">
          <span class="search-group-icon">${g.type==='ugc'?'⭐':'📁'}</span>
          <span class="search-group-title">${g.name}</span>
          <span class="search-group-count">${g.items.length} 条结果</span>
        </div>
        <div class="search-group-grid">`;
      // 搜索结果统一用grid平铺（避免瀑布流少量数据堆叠）
      {
        const items = g.items;
        html += `<div class="search-result-flat">`;
        html += items.map(w=>buildCard(w, allData.indexOf(w), false)).join('');
        html += `</div>`;
      }
      html += `</div></div>`;
    });
    grid.innerHTML = html;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  // UGC分类用瀑布流，其他用grid
  const cat = DATA.categories.find(c=>c.id===activeCatId);
  const isUgc = cat && cat.type === 'ugc';
  grid.classList.toggle('masonry', isUgc);
  
  // 同人不分页全展示，官方分页
  const pageSize = isUgc ? allData.length : PAGE_SIZE;
  const totalPages = isUgc ? 1 : Math.max(1, Math.ceil(allData.length / pageSize));
  if(currentPage > totalPages) currentPage = totalPages;
  
  const start = isUgc ? 0 : (currentPage - 1) * pageSize;
  const pageData = allData.slice(start, start + pageSize);
  currentList = allData;
  document.getElementById('gridCount').textContent = `共 ${allData.length} 条数据`;
  
  if(allData.length===0){
    grid.innerHTML='<div class="empty-msg">暂无数据</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  function buildCard(w, idx, big){
    const sf = (w.extFields||[]).filter(e=>e.show);
    const ms = sf.filter(e=>e.key!=='创作者').map(e=>e.value).join(' · ');
    const cf = sf.find(e=>e.key==='创作者');
    const ha = w.authorAvatar && cf;
    return `<div class="wp-card${big?' wp-card-big':''}" onclick="openPreview(${idx})">
      ${w.badge?`<span class="wp-badge">${w.badge}</span>`:''}
      <div class="wp-card-img"><img src="${w.thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="wp-card-overlay"><div class="wp-card-title">${w.title}</div><div class="wp-card-meta">${w.date}${ms?' · '+ms:''}</div>${ha?`<div class="wp-card-author"><img class="wp-card-avatar" src="${w.authorAvatar}" onerror="this.style.display='none'"><span class="wp-card-author-name">${cf.value}</span></div>`:''}</div>
      </div></div>`;
  }

  if(isUgc){
    // 同人画廊：瀑布流，横竖交替
    const hCards = pageData.filter(w=>w.orient!=='v');
    const vCards = pageData.filter(w=>w.orient==='v');
    let renderData = [], hi=0, vi=0;
    while(hi<hCards.length || vi<vCards.length){
      if(hi<hCards.length) renderData.push(hCards[hi++]);
      if(hi<hCards.length) renderData.push(hCards[hi++]);
      if(vi<vCards.length) renderData.push(vCards[vi++]);
      if(hi<hCards.length) renderData.push(hCards[hi++]);
    }
    grid.innerHTML = renderData.map((w,i)=>buildCard(w, start+pageData.indexOf(w), false)).join('');
  } else {
    // 官方壁纸：分组布局，每5张一组（1大+4小），大图左右交替
    let html = '';
    for(let g=0; g<pageData.length; g+=5){
      const group = pageData.slice(g, g+5);
      const groupNum = Math.floor(g/5);
      const isRight = groupNum % 2 === 1;
      
      if(group.length >= 5){
        // 完整组：1大+4小
        const bigCard = buildCard(group[0], start+g, true);
        const smCards = group.slice(1,5).map((w,si)=>buildCard(w, start+g+si+1, false)).join('');
        if(!isRight){
          html += `<div class="grid-row">${bigCard}${smCards}</div>`;
        } else {
          html += `<div class="grid-row grid-row-right">${smCards}${bigCard}</div>`;
        }
      } else {
        // 不足5张：全部等大4列
        html += `<div class="grid-row grid-row-flat">${group.map((w,si)=>buildCard(w, start+g+si, false)).join('')}</div>`;
      }
    }
    grid.innerHTML = html;
  }
  
  // Pagination
  renderPagination(totalPages, allData.length);
}

function renderPagination(totalPages, total){
  const pg = document.getElementById('pagination');
  if(totalPages <= 1){
    // 同人画廊不分页时显示底部提示
    const cat = DATA.categories.find(c=>c.id===activeCatId);
    const isUgc = cat && cat.type === 'ugc';
    if(isUgc && total > 0 && !isSearchMode){
      pg.innerHTML=`<div class="ugc-bottom-tip" style="padding:0;max-width:100%;width:100%"><div class="ugc-bottom-inner">
        <div class="ugc-bottom-line"><span style="font-size:18px">✨</span></div>
        <div class="ugc-bottom-title"><span>海量作品</span> 持续更新中</div>
        <div class="ugc-bottom-desc">共收录 ${total} 幅同人佳作 · 更多创作者作品正在路上</div>
      </div></div>`;
    } else {
      pg.innerHTML='';
    }
    return;
  }
  let html = `<button class="page-btn ${currentPage===1?'disabled':''}" onclick="goPage(${currentPage-1})">‹</button>`;
  for(let i=1;i<=totalPages;i++){
    if(totalPages>7 && i>2 && i<totalPages-1 && Math.abs(i-currentPage)>1){
      if(i===3 || i===totalPages-2) html+=`<span class="page-btn" style="border:none;pointer-events:none">…</span>`;
      continue;
    }
    html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn ${currentPage===totalPages?'disabled':''}" onclick="goPage(${currentPage+1})">›</button>`;
  html+=`<span class="page-info">${(currentPage-1)*PAGE_SIZE+1}-${Math.min(currentPage*PAGE_SIZE,total)} / ${total}</span>`;
  pg.innerHTML = html;
}

function goPage(p){
  const allData = getVisibleWallpapers();
  const totalPages = Math.ceil(allData.length / PAGE_SIZE);
  if(p<1||p>totalPages)return;
  currentPage=p;
  renderGrid();
  document.querySelector('.grid-section').scrollIntoView({behavior:'smooth',block:'start'});
}

// ===== Search =====
let isSearchMode = false;
function handleSearch(e){
  if(e.key!=='Enter')return;
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!kw){isSearchMode=false;renderGrid();return}
  isSearchMode=true;
  // Search across ALL wallpapers
  const all = DATA.wallpapers.filter(w=>w.status);
  const results = all.filter(w=>{
    if(w.title.toLowerCase().includes(kw)) return true;
    if(w.date&&w.date.includes(kw)) return true;
    for(const ext of (w.extFields||[])){
      if(ext.value.toLowerCase().includes(kw)) return true;
    }
    return false;
  });
  renderGrid(results);
}

// ===== Preview =====
function getCatName(catId){
  for(const c of DATA.categories){
    if(c.id===catId) return c.name;
    for(const s of (c.children||[])){
      if(s.id===catId) return c.name+' / '+s.name;
    }
  }
  return '';
}

let modalZoom = 100;
const ZOOM_STEP = 25;
const ZOOM_MIN = 25;
const ZOOM_MAX = 300;

function openPreview(idx){
  modalIdx=idx;
  const w=currentList[idx];if(!w)return;
  // 直接加载最清晰的图：originalImg > 缩略图放大版
  // 预览图优先级：originalImg > resFiles第一张 > 缩略图
  let previewSrc = w.thumb;
  if(w.originalImg) {
    previewSrc = w.originalImg;
  } else if(w.resFiles && w.resFiles.length > 0 && w.resFiles[0].url) {
    previewSrc = w.resFiles[0].url;
  }
  document.getElementById('modalImg').src = previewSrc;
  // Reset zoom
  modalZoom = 100;
  applyZoom();
  
  // Build side panel
  const extRows = (w.extFields||[]).filter(e=>e.show).map(e=>
    `<div class="modal-info-row"><span class="modal-info-label">${e.key}</span><span class="modal-info-value">${e.value}</span></div>`
  ).join('');
  
  // Resolution download — 直接从壁纸自身的resFiles读取
  const wpResFiles = (w.resFiles || []).filter(f=>f.label);
  const hRes = wpResFiles.filter(f=>f.type==='横版');
  const vRes = wpResFiles.filter(f=>f.type==='竖版');

  if(hRes.length===0 && vRes.length===0){

  }
  if(hRes.length>0){
    dlHtml+=`<div class="dl-group-title">横版尺寸</div><div class="dl-list">${hRes.map(f=>`
      <div class="dl-item">
        <div class="dl-item-info" onclick="event.stopPropagation();switchPreviewRes('${f.url||''}')"><div class="dl-label">${f.label}</div></div>
        <div class="dl-icon" onclick="event.stopPropagation();downloadRes('${f.url||''}','${f.label}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
      </div>`).join('')}</div>`;
  }
  if(vRes.length>0){
    dlHtml+=`<div class="dl-group-title">竖版尺寸</div><div class="dl-list">${vRes.map(f=>`
      <div class="dl-item">
        <div class="dl-item-info" onclick="event.stopPropagation();switchPreviewRes('${f.url||''}')"><div class="dl-label">${f.label}</div></div>
        <div class="dl-icon" onclick="event.stopPropagation();downloadRes('${f.url||''}','${f.label}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
      </div>`).join('')}</div>`;
  }
  
  document.getElementById('modalSide').innerHTML = `
    <div class="modal-side-title">${w.title}</div>
    <div class="modal-side-date">${w.date||''}</div>
    <div class="modal-info-row"><span class="modal-info-label">分类</span><span class="modal-info-value">${getCatName(w.catId)}</span></div>
    ${extRows}
    <div class="dl-section">
      <div class="dl-title">选择壁纸尺寸</div>
      ${dlHtml}
    </div>
  `;
  
  document.getElementById('previewModal').classList.add('show');
  document.body.style.overflow='hidden';
}

function modalPrev(){if(modalIdx>0)openPreview(modalIdx-1)}
function modalNext(){if(modalIdx<currentList.length-1)openPreview(modalIdx+1)}

// ===== Zoom =====
function applyZoom(){
  const img=document.getElementById('modalImg');
  img.style.transform=`scale(${modalZoom/100})`;
  document.getElementById('zoomPct').textContent=modalZoom+'%';
}
function zoomIn(){
  if(modalZoom<ZOOM_MAX){modalZoom=Math.min(ZOOM_MAX,modalZoom+ZOOM_STEP);applyZoom()}
}
function zoomOut(){
  if(modalZoom>ZOOM_MIN){modalZoom=Math.max(ZOOM_MIN,modalZoom-ZOOM_STEP);applyZoom()}
}

// 点击分辨率文字 → 切换预览图为该分辨率
function switchPreviewRes(url){
  if(url){
    document.getElementById('modalImg').src=url;
    modalZoom=100;applyZoom();
  }
}
// 点击下载图标 → 下载
function downloadRes(url,label){
  if(url){
    const a=document.createElement('a');a.href=url;a.download=label||'wallpaper';a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  } else {
    alert('下载 '+label);
  }
}
// ===== Submit Modal =====
function openSubmitModal(){
  const sc=DATA.submitConfig;
  document.getElementById('submitModalContent').innerHTML=`
    <h3>投稿说明</h3>
    <div class="modal-info-row" style="margin:16px 0"><span class="modal-info-label">投稿邮箱</span><span class="modal-info-value" style="color:#3b7ddd;font-weight:600">${sc.email||''}</span></div>
    <div class="submit-rule-box" style="white-space:pre-line;line-height:1.8">${sc.content||'暂无投稿说明'}</div>
  `;
  document.getElementById('submitModal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSubmitModal(){document.getElementById('submitModal').classList.remove('show');document.body.style.overflow=''}

// ===== Hash Router（公告/活动列表+详情）=====
const mainSections = ['heroSection','filter-bar-wrap','submitBar','ugcExtra','grid-section-wrap'];

function handleRoute(){
  const hash = location.hash || '';
  const match = hash.match(/^#\/(notice|activity)(?:\/(\d+))?$/);
  
  if(!match){
    // 回到主页
    document.getElementById('routePage').style.display='none';
    document.querySelectorAll('.hero,.filter-bar,.submit-bar,.ugc-extra,.grid-section').forEach(el=>el.style.display='');
    return;
  }
  
  // 隐藏主页内容，显示路由页
  document.querySelectorAll('.hero,.filter-bar,.submit-bar,.ugc-extra,.grid-section').forEach(el=>el.style.display='none');
  document.getElementById('routePage').style.display='block';
  
  const type = match[1]; // 'notice' or 'activity'
  const detailId = match[2] ? parseInt(match[2]) : null;
  
  if(detailId){
    renderRouteDetail(type, detailId);
  } else {
    renderRouteList(type);
  }
  window.scrollTo(0,0);
}

function renderRouteList(type){
  const isNotice = type==='notice';
  const items = isNotice ? (DATA.notices||[]).filter(n=>n.status).sort((a,b)=>(a.sort||99)-(b.sort||99)) : (DATA.activities||[]).filter(a=>a.status).sort((a,b)=>(a.sort||99)-(b.sort||99));
  const title = isNotice ? '📢 公告列表' : '⭐ 活动列表';
  const dotColor = isNotice ? '#3b7ddd' : '#e67e22';
  
  document.getElementById('routeContent').innerHTML = `
    <button class="route-back" onclick="location.hash=''">← 返回壁纸站</button>
    <div class="route-page-title">${title}</div>
    ${items.length ? items.map(item=>`
      <div class="route-list-item" onclick="location.hash='#/${type}/${item.id}'">
        <span class="r-dot" style="background:${dotColor}"></span>
        <div class="r-body">
          <div class="r-title">${item.tag?`<span class="ugc-item-tag ${item.tag}" style="margin-right:6px">${item.tag==='hot'?'HOT':item.tag==='new'?'NEW':item.tag.toUpperCase()}</span>`:''}${item.text}</div>
          <div class="r-date">${item.date}</div>
        </div>
        <span class="r-arrow">›</span>
      </div>
    `).join('') : '<div style="padding:40px;text-align:center;color:#b0b8c8">暂无内容</div>'}
  `;
}

function renderRouteDetail(type, id){
  const isNotice = type==='notice';
  const items = isNotice ? (DATA.notices||[]) : (DATA.activities||[]);
  const item = items.find(i=>i.id===id);
  const backTitle = isNotice ? '公告列表' : '活动列表';
  
  if(!item){
    document.getElementById('routeContent').innerHTML = `
      <button class="route-back" onclick="history.back()">← 返回</button>
      <div style="padding:60px;text-align:center;color:#b0b8c8">内容不存在</div>`;
    return;
  }
  
  // 兼容旧纯文本和新HTML格式
  let bodyHtml = item.content || '暂无详情内容';
  if(bodyHtml && !/<[a-z][\s\S]*>/i.test(bodyHtml)){
    bodyHtml = bodyHtml.replace(/\n/g,'<br>');
  }
  
  document.getElementById('routeContent').innerHTML = `
    <button class="route-back" onclick="history.back()">← 返回</button>
    <div class="route-detail-title">${item.text}</div>
    <div class="route-detail-meta">
      <span>${item.date}</span>
      ${item.tag?`<span class="ugc-item-tag ${item.tag}">${item.tag==='hot'?'HOT':item.tag==='new'?'NEW':item.tag.toUpperCase()}</span>`:''}
    </div>
    <div class="route-detail-body">${bodyHtml}</div>
  `;
}

window.addEventListener('hashchange', handleRoute);

// Events
// ===== PRD Preview Bridge (postMessage) =====
window.addEventListener('message', e => {
  if(e.data.action === 'openModal'){
    // Open the first wallpaper preview
    const ugcCat = DATA.categories.find(c=>c.type==='ugc');
    if(ugcCat){
      activeCatId = ugcCat.id;
      currentList = DATA.wallpapers.filter(w=>w.catId===activeCatId && w.status).sort((a,b)=>a.sort-b.sort);
      if(currentList.length > 0) openPreview(0);
    }
  }
  if(e.data.action === 'switchNav' && e.data.catId){
    activeCatId = e.data.catId;
    renderNav();renderBanner();renderCatTabs();renderSubmitBar();renderGrid();
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closePreview();closeSubmitModal()}
  if(document.getElementById('previewModal').classList.contains('show')){
    if(e.key==='ArrowLeft')modalPrev();
    if(e.key==='ArrowRight')modalNext();
    if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn()}
    if(e.key==='-'||e.key==='_'){e.preventDefault();zoomOut()}
    if(e.key==='0'){e.preventDefault();modalZoom=100;applyZoom()}
  }
});
document.getElementById('previewModal').addEventListener('click',e=>{if(e.target.id==='previewModal')closePreview()});
document.getElementById('submitModal').addEventListener('click',e=>{if(e.target.id==='submitModal')closeSubmitModal()});

// Go
init();
handleRoute();
</script>
</body>
</html>
