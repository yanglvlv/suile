<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,user-scalable=no">
<title>另一种人生 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#game-container {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
canvas { display: block; max-width: 100%; max-height: 100%; }
</style>
</head>
<body>
<div id="game-container"></div>
<div id="debug-log" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:rgba(0,0,0,.9);color:#0f0;font:11px monospace;padding:6px;z-index:99999;display:none"></div>
<script>
  const dbg = document.getElementById('debug-log');
  let errCount = 0;
  function dbgLog(msg) { dbg.style.display='block'; dbg.innerHTML += msg + '<br>'; dbg.scrollTop = dbg.scrollHeight; }
  window.onerror = (msg, src, line) => { errCount++; dbgLog('❌ ' + msg + ' (' + (src||'').split('/').pop() + ':' + line + ')'); if(errCount>20) return; };
  window.addEventListener('unhandledrejection', e => dbgLog('❌ Promise: ' + (e.reason?.message || e.reason)));
</script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
