<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<div id="game-container"></div>
<div id="log" style="position:fixed;top:0;left:0;right:0;max-height:50vh;overflow:auto;background:#111;color:#0f0;font:12px monospace;padding:8px;z-index:9999"></div>
<script>
// 捕获所有错误
const logEl = document.getElementById('log');
function log(msg) {
  logEl.innerHTML += msg + '<br>';
  console.log(msg);
}
window.onerror = function(msg, src, line, col, err) {
  log('❌ ERROR: ' + msg + ' at ' + src + ':' + line);
  return false;
};
window.addEventListener('unhandledrejection', e => {
  log('❌ REJECT: ' + e.reason);
});
log('🟢 Test page loaded, importing Phaser...');
</script>
<script type="module">
const logEl = document.getElementById('log');
function log(msg) { logEl.innerHTML += msg + '<br>'; console.log(msg); }

try {
  log('Importing Phaser...');
  const Phaser = (await import('phaser')).default;
  log('✅ Phaser loaded: ' + Phaser.VERSION);
  
  // 最小化测试
  const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 450,
    height: 800,
    backgroundColor: '#1a1a2e',
    scene: {
      preload() { log('preload() called'); },
      create() {
        log('create() called');
        const gfx = this.add.graphics();
        
        // 测试各种方法
        try { gfx.fillStyle(0xff0000, 1); gfx.fillRect(10,10,100,100); log('✅ fillRect OK'); } catch(e) { log('❌ fillRect: ' + e.message); }
        try { gfx.fillCircle(200, 200, 50); log('✅ fillCircle OK'); } catch(e) { log('❌ fillCircle: ' + e.message); }
        try { gfx.fillRoundedRect(10, 200, 100, 50, 8); log('✅ fillRoundedRect OK'); } catch(e) { log('❌ fillRoundedRect: ' + e.message); }
        try { gfx.fillEllipse(300, 300, 60, 30); log('✅ fillEllipse OK'); } catch(e) { log('❌ fillEllipse: ' + e.message); }
        try { gfx.fillGradientStyle(0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 1); gfx.fillRect(10, 400, 200, 50); log('✅ fillGradientStyle OK'); } catch(e) { log('❌ fillGradientStyle: ' + e.message); }
        try { gfx.fillTriangle(350, 10, 400, 80, 300, 80); log('✅ fillTriangle OK'); } catch(e) { log('❌ fillTriangle: ' + e.message); }
        try { gfx.generateTexture('test_tex', 32, 32); log('✅ generateTexture OK'); } catch(e) { log('❌ generateTexture: ' + e.message); }
        
        // 测试text
        try { this.add.text(200, 500, 'Hello World', { fontSize: '24px', color: '#ffffff' }); log('✅ text OK'); } catch(e) { log('❌ text: ' + e.message); }
        
        log('🎮 Scene created successfully!');
      }
    }
  };
  
  const game = new Phaser.Game(config);
  log('Game instance created');
} catch(e) {
  log('❌ FATAL: ' + e.message + '\\n' + e.stack);
}
</script>
</body>
</html>
